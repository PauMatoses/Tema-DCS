    {tipo:"D",cod:"2000/LCS/14.con",ep:"1. Concepto y diferencia con otros precios",txt:"Precio de la garantía del asegurador. Prima pura (riesgo) + recargos (gastos, beneficio, CCS). Diferencia con cuota mutual (a posteriori) y derrama (complementaria)",pegword:"PRECIO DE LA GARANTÍA",oral:"La prima es el precio técnico del riesgo: no es un precio arbitrario sino un cálculo actuarial"},
    {tipo:"D",cod:"2000/LCS/14.calc",ep:"2.1 Cálculo",txt:"Prima de riesgo = frecuencia × intensidad media. Se añaden recargos: gastos internos/externos, margen de beneficio, recargo CCS. Prima de tarifa vs. prima comercial",pegword:"FRECUENCIA × INTENSIDAD",oral:"El cálculo básico es frecuencia por intensidad: cuántas veces ocurre y cuánto cuesta cada vez"},
    {tipo:"D",cod:"2000/LCS/14.clas",ep:"2.2 Clases de primas",txt:"Única vs. periódica. Natural (varía con edad) vs. nivelada (constante). Pura vs. comercial vs. de inventario vs. de tarifa. Fraccionada",pegword:"NATURAL/NIVELADA",oral:"La prima natural sube con la edad; la nivelada la reparte uniformemente gracias a la provisión matemática"},
    {tipo:"D",cod:"2000/LCS/14.bt",ep:"3. Bases técnicas y tarifas",txt:"Bases técnicas: tablas de mortalidad/supervivencia, estadísticas siniestralidad, tipos de interés técnico. Tarifas: aplicación comercial de las bases. Control por DGSFP",pegword:"TABLAS + ESTADÍSTICA",oral:"Las bases técnicas son el fundamento actuarial; las tarifas su traducción al mercado"},
    {tipo:"J",cod:"ACT.G32.c",nombre:"Suficiencia de la prima",txt:"La prima debe ser suficiente para cubrir riesgo + gastos + margen. La insuficiencia conduce a la insolvencia"},
    {tipo:"D",cod:"2000/LCS/14.ppios",ep:"4. Principios: indivisibilidad, invariabilidad, suficiencia",txt:"Indivisibilidad (art. 1169 CC): no pago parcial por período. Invariabilidad: estable salvo arts. 12-13. Suficiencia: obligación técnica y de supervisión",pegword:"INDIVISIBLE",oral:"La prima es indivisible por período, invariable salvo cambio de riesgo, y debe ser siempre suficiente"},
    {tipo:"D",cod:"2000/LCS/14.var",ep:"5. Variabilidad",txt:"Bonus-malus: ajuste por siniestralidad individual. Prima ajustable por experiencia. Variación entre períodos permitida",pegword:"BONUS-MALUS",oral:"El bonus-malus es la excepción a la invariabilidad: la prima sigue la experiencia del asegurado"},
    {tipo:"D",cod:"2000/LCS/33",ep:"6. Coaseguro",txt:"Art. 33: varios aseguradores, un contrato, cuotas pactadas. Cada uno responde de su cuota. Coaseguro comunitario (Directiva 78/473). Abrecuenta y compañía líder",pegword:"CUOTAS",oral:"El coaseguro reparte el riesgo por cuotas en un solo contrato: cada asegurador responde de la suya"},
    {tipo:"D",cod:"2000/LCS/33.int",ep:"7. Coaseguro interno",txt:"Reaseguro disfrazado: una sola entidad aparece ante el tomador pero internamente distribuye el riesgo. Discutido doctrinalmente",pegword:"DISFRAZADO",oral:"El coaseguro interno es en realidad reaseguro: una entidad ante el tomador, varias detrás"},
    {tipo:"D",cod:"2000/LCS/pool",ep:"8. Pools aseguradores",txt:"Agrupaciones para riesgos graves/especializados: nuclear, agrario (Agroseguro), medioambiental. Sin personalidad jurídica. Distribución de primas y siniestros",pegword:"POOL",oral:"Los pools permiten asumir colectivamente riesgos que ningún asegurador aceptaría solo"},
    {tipo:"D",cod:"2000/LCS/lloyd",ep:"9. Lloyd's de Londres",txt:"No es asegurador sino mercado de suscripción. Names (capital)/sindicatos (gestión). Lloyd's Act 1982. Broker como intermediario obligatorio. Cada sindicato suscribe por su cuenta",pegword:"MERCADO",oral:"El Lloyd's no es una compañía: es un mercado donde los sindicatos suscriben riesgos con su propio capital"},
  ]
},

T4: {
  titulo:"El reaseguro: clasificación, métodos, modalidades",
  nodos: [
    {tipo:"D",cod:"2000/LCS/77.con",ep:"1. El reaseguro: concepto y función / 1.1 Concepto",txt:"Art. 77: el reasegurador se obliga a reparar la deuda del asegurador derivada del contrato de seguro. Art. 78: no genera relación entre reasegurador y asegurado/tomador",pegword:"SEGURO DEL SEGURO",oral:"El reaseguro es el seguro del asegurador: el art. 78 blinda al tomador de cualquier relación con el reasegurador"},
    {tipo:"D",cod:"2000/LCS/77.fun",ep:"1.2 Funciones",txt:"Técnica: dispersión y homogeneización. Económica: amplía capacidad de suscripción. Financiera: estabiliza resultados. Social: permite cubrir grandes riesgos",pegword:"DISPERSIÓN-CAPACIDAD-ESTABILIDAD",oral:"El reaseguro cumple cuatro funciones: dispersa, amplía capacidad, estabiliza y permite grandes riesgos"},
    {tipo:"J",cod:"SEG.G32.d",nombre:"Dispersión del riesgo",txt:"El reaseguro implementa a nivel institucional la ley de grandes números"},
    {tipo:"D",cod:"2000/LCS/77.clas",ep:"1.3 Clasificación y retrocesión",txt:"Proporcional (cuota parte, excedente) vs. no proporcional (XL, stop-loss). Facultativo vs. obligatorio. Retrocesión: reaseguro del reasegurador",pegword:"PROPORCIONAL/NO PROPORCIONAL",oral:"La primera clasificación es proporcional vs. no proporcional; la segunda facultativo vs. obligatorio"},
    {tipo:"D",cod:"2000/LCS/77.fin",ep:"2. Reaseguro financiero",txt:"Componente financiero predomina sobre transferencia de riesgo. Alisamiento de resultados. Discutido regulatoriamente por LOSSEAR",pegword:"FINANCIERO",oral:"El reaseguro financiero alisa resultados más que transfiere riesgo: está en la frontera regulatoria"},
    {tipo:"D",cod:"2000/LCS/77.cp",ep:"3. Reaseguro de riesgos: cuota parte y excedente",txt:"Cuota parte: % fijo de cada póliza (primas y siniestros). Excedente: se cede lo que supera el pleno de retención. Facult-oblig como híbrido",pegword:"PLENO DE RETENCIÓN",oral:"En cuota parte todo se comparte al %; en excedente el asegurador retiene hasta su pleno y cede el exceso"},
    {tipo:"D",cod:"2000/LCS/77.fac",ep:"4. Método facultativo",txt:"Caso a caso, póliza a póliza. Ventaja: selección del riesgo cedido. Inconveniente: lento, costoso, sin automatismo. Usado para riesgos atípicos",pegword:"CASO A CASO",oral:"El facultativo selecciona pero es lento: se usa para riesgos que no encajan en el tratado"},
    {tipo:"D",cod:"2000/LCS/77.trat",ep:"5. Método obligatorio: el tratado",txt:"Cesión automática y obligatoria para ambas partes. Clases: cuota parte y excedente como tratados tipo. Cláusulas de contorno: exclusiones, límites, comisiones",pegword:"AUTOMÁTICO",oral:"El tratado automatiza: todo riesgo dentro de los parámetros se cede obligatoriamente"},
    {tipo:"D",cod:"2000/LCS/77.trat2",ep:"5.2 Clases de tratados",txt:"Cuota parte: proporción fija. Excedente: cesión del exceso sobre pleno. Mixtos: cuota parte + excedente. Funcionamiento: bordereaux de primas y siniestros",pegword:"BORDEREAUX",oral:"Los tratados se liquidan mediante bordereaux: listados periódicos de primas y siniestros cedidos"},
    {tipo:"D",cod:"2000/LCS/77.prec",ep:"6. Precio en reaseguros de riesgos",txt:"Comisión de reaseguro: descuento sobre prima cedida que cubre gastos del cedente. Participación en beneficios. Depósito de reservas",pegword:"COMISIÓN",oral:"El precio del reaseguro se fija mediante la comisión: descuento sobre prima cedida + participación en beneficios"},
    {tipo:"D",cod:"2000/LCS/77.sin",ep:"7. Reaseguro de siniestros",txt:"No proporcional: el reasegurador solo paga si el siniestro supera un umbral (prioridad). Categorías: por riesgo, por evento, por catástrofe",pegword:"PRIORIDAD",oral:"En el reaseguro de siniestros el reasegurador solo entra cuando se supera la prioridad"},
    {tipo:"D",cod:"2000/LCS/77.xl",ep:"8. Excess-loss",txt:"Working XL: siniestros individuales sobre prioridad. Cat XL: acumulación de siniestros por evento catastrófico. Prima: burning cost o exposición",pegword:"WORKING + CAT",oral:"El XL tiene dos modalidades: working para siniestros individuales y cat para acumulaciones catastróficas"},
    {tipo:"D",cod:"2000/LCS/77.xlp",ep:"9. Prima XL y cláusula de estabilización",txt:"Burning cost: prima basada en experiencia histórica. Cláusula de estabilización: ajusta los siniestros pasados por inflación",pegword:"BURNING COST",oral:"La prima de XL se calcula por burning cost: siniestralidad histórica ajustada por inflación"},
    {tipo:"D",cod:"2000/LCS/77.sl",ep:"10. Stop-loss",txt:"Protege el resultado global: el reasegurador paga si la siniestralidad total del cedente supera un % de primas. Cobertura de cola",pegword:"RESULTADO GLOBAL",oral:"El stop-loss protege la cuenta de resultados completa, no siniestros individuales: es la última red"},
    {tipo:"D",cod:"2000/LCS/77.new",ep:"11. Nuevas modalidades",txt:"Sidecars, cat bonds, ILS (insurance-linked securities). Transferencia de riesgo a mercados de capitales. Titulización de riesgos catastróficos",pegword:"CAT BONDS",oral:"Los cat bonds transfieren el riesgo catastrófico a inversores del mercado de capitales: nueva frontera"},
  ]
},

T5: {
  titulo:"El contrato de seguro: concepto y caracteres",
  nodos: [
    {tipo:"D",cod:"2000/CC/1791",ep:"1. El contrato de seguro: concepto y caracteres",txt:"CC art. 1791 (derogado): solo cubría daños a bienes por precio cierto. Influencia del seguro marítimo. Insuficiente para seguros de personas y vida",pegword:"DUALIDAD",oral:"El art. 1791 CC, limitado al daño fortuito en bienes, hizo inevitable la teoría dualista"},
    {tipo:"J",cod:"SEG.G22.b",nombre:"Teoría dualista",txt:"Garrigues: semillero de contratos diversos. Necesidad concreta (daños) vs. abstracta (vida). Indemnización vs. suma convenida"},
    {tipo:"D",cod:"2000/LCS/1",ep:"1. Definición legal",txt:"Art. 1: el asegurador se obliga mediante prima a indemnizar el daño O satisfacer capital/renta. Definición dual que supera el CC. Doctrina: incompleta pero suficientemente amplia",pegword:"INDEMNIZAR O SATISFACER",oral:"El art. 1 contiene la dualidad en una frase: 'indemnizar' para daños, 'satisfacer' para personas"},
    {tipo:"D",cod:"2000/LCS/82.rem",ep:"1. Reminiscencia unitaria",txt:"Art. 82: prohíbe subrogación en personas. Algunos autores ven reminiscencia unitaria. La teoría dualista mantiene elementos comunes: riesgo, azar, incertidumbre, siniestro",pegword:"ART. 82",oral:"El art. 82 es la piedra de toque: su prohibición de subrogación en personas solo se explica desde la dualidad"},
    {tipo:"D",cod:"2000/LCS/1.bf",ep:"A) Buena fe",txt:"Uberrimae fidei (Garrigues). CC: buena fe subjetiva (ignorancia). CCom art. 57: objetiva. LCS: enfoque desde mala fe/dolo. Opera pre/concomitante/ulteriormente. Arts. 10,16,32,48",pegword:"UBERRIMAE FIDEI",oral:"La buena fe en seguro es máxima: opera antes del contrato (cuestionario), durante (agravación) y después (siniestro)"},
    {tipo:"J",cod:"CON.K12.a",nombre:"Buena fe reforzada",txt:"Garrigues califica el seguro de uberrimae fidei contractus: exigencia previa, concomitante y ulterior"},
    {tipo:"D",cod:"2000/LCS/1.sus",ep:"B) Sustantividad",txt:"El contrato debe ser autónomo, no cláusula accesoria de otro. Crítica al seguro de caución como modalidad de fianza",pegword:"AUTÓNOMO",oral:"La sustantividad exige que la obligación del asegurador nazca de pacto principal, no de otro contrato"},
    {tipo:"D",cod:"2000/LCS/5",ep:"C) Forma",txt:"Art. 5: formalización por escrito. Pero es consensual (arts. 1254, 1258 CC; 51, 52 CCom). La forma es probatoria, no constitutiva",pegword:"CONSENSUAL",oral:"El contrato es consensual: la póliza prueba pero no crea el vínculo, conforme al principio antiformalista"},
    {tipo:"D",cod:"2000/LCS/1.bil",ep:"D) Bilateralidad",txt:"Tomador paga prima; asegurador presta indemnización/capital condicionado al siniestro. Obligaciones recíprocas",pegword:"RECÍPROCO",oral:"La bilateralidad es clara: prima contra prestación condicionada al siniestro"},
    {tipo:"D",cod:"2000/LCS/1.one",ep:"E) Onerosidad",txt:"La prima es la contraprestación de la obligación del asegurador. Ambas partes obtienen beneficio o sacrificio patrimonial",pegword:"ONEROSO",oral:"La onerosidad distingue el seguro de la donación: ambas partes dan y reciben"},
    {tipo:"D",cod:"2000/LCS/1.ale",ep:"F) Aleatoriedad",txt:"Art. 1790 CC: contrato aleatorio. Incertidumbre del si, del cuándo y del cuánto, combinables. Distingue del contrato conmutativo",pegword:"ALEATORIO",oral:"La aleatoriedad afecta al si, al cuándo y al cuánto: sin ella el contrato sería conmutativo"},
    {tipo:"D",cod:"2000/LCS/22",ep:"G) Duración",txt:"Art. 22: máximo 10 años, prórrogas anuales. Tracto sucesivo. Bruck: seguros de intereses (necesidad concreta) vs. seguros de personas (necesidad abstracta). Vida: sin límite",pegword:"10 AÑOS",oral:"El art. 22 limita a 10 años con prórrogas, salvo vida que no tiene límite de duración"},
    {tipo:"D",cod:"2000/LCS/50.reg",ep:"2. Regulación",txt:"Garrigues: Dcho Seguros = normas jurídicas que regulan el seguro como fenómeno social. Normas de Dcho público (supervisión) y privado (contrato). Carácter tuitivo. Usos y condiciones generales",pegword:"TUITIVO",oral:"El Derecho de Seguros combina público y privado con carácter tuitivo: proteger al asegurado es el eje"},
    {tipo:"D",cod:"2000/LCS/50.ant",ep:"3.1 Antecedentes",txt:"CCom 1885 (arts. 380-438, 737-805), CC (1791-1797), Ley 1908, Reglamento 1912. Concurso Marín Lázaro 1952. Anteproyecto Sánchez Calero/Olivencia 1970. Ley 50/1980 (BOE 17/10, vigor 6 meses)",pegword:"1980",oral:"La LCS de 1980 culmina medio siglo de intentos: del concurso Marín Lázaro al anteproyecto de 1970"},
    {tipo:"D",cod:"2000/LCS/50.est",ep:"3.2 Estructura",txt:"109 arts, 4 Títulos: I (generales, 4 secciones), II (daños, comunes + específicos), III (personas: vida, accidentes, enfermedad, decesos, dependencia), IV (DIPr, Ley 21/1990). 5 DA, 1 DT, 1 DF",pegword:"4 TÍTULOS",oral:"La estructura en 4 títulos refleja la dualidad: generales, daños, personas, y DIPr como cierre"},
    {tipo:"D",cod:"2000/LCS/2",ep:"3.3 Ámbito",txt:"Art. 2: imperatividad (ius cogens). Excepción: grandes riesgos (Ley 21/1990). Supletoria para marítimos/aéreos/agrarios. Sánchez Calero: legislación mercantil convertida en Dcho común. Art. 6.3 CC: nulidad por infracción",pegword:"IMPERATIVIDAD",oral:"El art. 2 es la llave de toda la LCS: imperatividad como regla, dispositividad como excepción tasada"},
    {tipo:"J",cod:"CON.D86.a",nombre:"Contrato de adhesión",txt:"La imperatividad del art. 2 se justifica por la posición de adherente del asegurado"},
    {tipo:"J",cod:"SEG.G22.e",nombre:"Origen marítimo",txt:"El seguro marítimo es el prototipo histórico; la LCS superó esa visión parcial del CC"},
  ]
},

T6: {
  titulo:"Elementos personales y reales del contrato",
  nodos: [
    {tipo:"D",cod:"2000/LCS/1.asg",ep:"1. Elementos personales del contrato de seguro / 1.1 Asegurador",txt:"Art. 1: se obliga a indemnizar/satisfacer. LOSSEAR art. 27: formas jurídicas (SA, SAE, mutua, cooperativa, mutualidad). Art. 24 LOSSEAR: nulidad sin autorización. Devolución prima si no hay siniestro; indemnización + daños si lo hay",pegword:"AUTORIZACIÓN",oral:"Solo las entidades autorizadas pueden ser aseguradoras: el art. 24 LOSSEAR sanciona con nulidad y responsabilidad"},
    {tipo:"D",cod:"2000/LCS/7.tom",ep:"1.2 Tomador",txt:"Suscribe el contrato. Art. 7: cuenta propia/ajena. Art. 8: presunción cuenta propia. Obligaciones: prima (14-15), declaración (10). Titularidad: modifica (5), resuelve (13), denuncia (22). En vida: designa beneficiario (84,87), rescate (96), cesión (99)",pegword:"SUSCRIBE Y PAGA",oral:"El tomador suscribe, paga y tiene la titularidad del contrato: puede modificarlo, resolverlo y denunciarlo"},
    {tipo:"D",cod:"2000/LCS/7.ado",ep:"1.3 Asegurado",txt:"Titular del interés. Art. 7 cuenta ajena: derechos al asegurado, obligaciones al tomador. Art. 83: consentimiento escrito para muerte de tercero. Garrigues: figura intermedia entre representación directa/indirecta. Sánchez Calero: art. 1257 CC",pegword:"TITULAR DEL INTERÉS",oral:"El asegurado es titular del interés y del derecho a la prestación, aunque no sea parte contratante"},
    {tipo:"D",cod:"2000/LCS/84.ben",ep:"1.4 Beneficiario",txt:"Arts. 84-88: designación libre y revocable (póliza, escrito, testamento). Art. 88: aun contra herederos/acreedores. Art. 92: pérdida por muerte dolosa del asegurado. Doctrina: estipulación a favor de tercero (art. 1257 CC)",pegword:"DESIGNACIÓN",oral:"El beneficiario tiene derecho propio y autónomo: el art. 88 lo blinda incluso frente a herederos legítimos"},
    {tipo:"D",cod:"2000/CC/1257",ep:"1.4 Naturaleza jurídica",txt:"Art. 1257 CC: estipulación a favor de tercero. No necesita aceptar. Derecho autónomo independiente de la herencia. En daños: no hay beneficiario propiamente dicho (carácter indemnizatorio)",pegword:"FAVOR DE TERCERO",oral:"La doctrina es unánime: beneficiario como estipulación a favor de tercero del art. 1257 CC"},
    {tipo:"J",cod:"SEG.G22.b",nombre:"Teoría dualista",txt:"El beneficiario es figura propia de personas; en daños el carácter indemnizatorio impide su existencia plena"},
    {tipo:"D",cod:"2000/LCS/76.med",ep:"1.5 Mediador y perjudicado",txt:"Ley 26/2006: agente (art. 12.1: representa asegurador, pago surte efectos) vs. corredor (art. 26.4: asesor del tomador, pago NO surte efectos salvo recibo). Art. 76: acción directa del perjudicado en RC",pegword:"AGENTE ≠ CORREDOR",oral:"El agente representa al asegurador (el pago le vincula); el corredor asesora al tomador (el pago no vincula)"},
    {tipo:"D",cod:"2000/LCS/4.rgo",ep:"2.1 El riesgo",txt:"Art. 1: posibilidad, azar, necesidad patrimonial. Art. 4: nulidad sin riesgo (absoluta, ex tunc, imprescriptible). Art. 19: mala fe exonera. Riesgo putativo: subjetivamente incierto pero no futuro (art. 423 LNM)",pegword:"NULIDAD SIN RIESGO",oral:"Sin riesgo el contrato es nulo (art. 4): nulidad absoluta, de pleno derecho e imprescriptible"},
    {tipo:"D",cod:"2000/LCS/14",ep:"2.2 La prima",txt:"Art. 14: pago tras firma. Art. 15: 1ª prima impagada → sin efectos; sucesivas → suspensión 1 mes, resolución 6 meses. Indivisibilidad (1169 CC). Pago por tercero permitido (1158 CC). Domiciliación bancaria habitual",pegword:"1 MES / 6 MESES",oral:"El art. 15 escala: 1ª prima impagada = sin efectos; sucesivas = suspensión 1 mes y resolución a los 6"},
    {tipo:"D",cod:"2000/LCS/8.obj",ep:"2.3 Objeto asegurado",txt:"Art. 8: debe constar en póliza. En daños: cosa (simple, compuesta, universalidad), material o inmaterial, presente o futura. En personas: la persona expuesta al riesgo",pegword:"COSA O PERSONA",oral:"El objeto es la cosa en daños y la persona en seguros de personas: debe constar siempre en la póliza"},
    {tipo:"D",cod:"2000/LCS/25",ep:"2.4 Interés en daños vs. personas",txt:"Art. 25: nulidad sin interés en daños (paralela al art. 4). Interés = relación económica persona-objeto. En personas: no hay norma equivalente; art. 83 sustituye interés por consentimiento. Sin interés → apuesta",pegword:"INTERÉS O CONSENTIMIENTO",oral:"En daños el interés determina la indemnización (art. 25); en personas el consentimiento lo sustituye (art. 83)"},
    {tipo:"J",cod:"SEG.G22.a",nombre:"Principio indemnizatorio",txt:"El interés asegurable es el puente entre riesgo y principio indemnizatorio: mide la pérdida y limita la prestación"},
  ]
},

T7: {
  titulo:"Elementos formales del contrato",
  nodos: [
    {tipo:"D",cod:"2000/LCS/6.sol",ep:"1. Elementos formales: la póliza, la proposición y la solicitud / 1.1 Solicitud",txt:"Art. 6: la solicitud no vincula al solicitante. Es manifestación de interés, no oferta contractual",pegword:"NO VINCULA",oral:"La solicitud no vincula: el contrato se perfecciona por consentimiento, no por formulario"},
    {tipo:"D",cod:"2000/CC/1262",ep:"1.1 Perfección",txt:"Art. 1262 CC: consentimiento por concurso de oferta y aceptación. CC: teoría del conocimiento (art. 1262.2). CCom: teoría de la emisión (art. 54). Doctrina: criterio mercantil por contratación en masa",pegword:"OFERTA + ACEPTACIÓN",oral:"La perfección sigue el art. 1262 CC pero la doctrina prefiere el criterio mercantil del art. 54 CCom"},
    {tipo:"D",cod:"2000/LCS/6.pro",ep:"1.2 Proposición",txt:"Art. 6: oferta del asegurador, vincula 15 días. Silencio del tomador ≠ aceptación. Art. 6 in fine: a falta de proposición, la póliza sustituye",pegword:"15 DÍAS",oral:"La proposición vincula al asegurador 15 días: si no se acepta en plazo, caduca"},
    {tipo:"D",cod:"2000/LCS/5",ep:"1.3 Póliza",txt:"Art. 5: documento del contrato, debe entregarse. Consensual (1254, 1258 CC; 51, 52 CCom). Función reguladora y probatoria, no constitutiva. Clases: nominativa, a la orden, al portador",pegword:"PROBATORIA",oral:"La póliza no crea el contrato: es prueba del consentimiento ya prestado, conforme al principio antiformalista"},
    {tipo:"D",cod:"2000/LCS/6.cob",ep:"2. Cobertura provisional",txt:"Carta de garantía o nota de cobertura. Acredita cobertura antes de emisión formal. Resuelve el gap temporal entre perfección y documentación",pegword:"GAP",oral:"La cobertura provisional resuelve un problema práctico: asegurar antes de que exista la póliza formal"},
    {tipo:"D",cod:"2000/LCS/8",ep:"3. Contenido mínimo",txt:"Art. 8: 12 menciones obligatorias: datos de partes, riesgo, prima, suma asegurada, duración, naturaleza del seguro, fecha y firma, condiciones particulares. Plazo 1 mes para reclamación",pegword:"12 MENCIONES",oral:"El art. 8 exige 12 datos mínimos: es la garantía formal de que el contrato contiene lo esencial"},
    {tipo:"D",cod:"2000/L22/obj",ep:"4.1 Comercialización a distancia: objeto",txt:"Ley 22/2007: transpone Directiva 2002/65/CE. Protección del consumidor en contratación sin presencia simultánea. Se aplica a seguros contratados a distancia",pegword:"A DISTANCIA",oral:"La Ley 22/2007 regula la contratación a distancia de servicios financieros incluidos los seguros"},
    {tipo:"D",cod:"2000/L22/reg",ep:"4.2 Régimen contratos a distancia",txt:"Información precontractual obligatoria y detallada. Soporte duradero. Carga de la prueba: sobre el prestador de servicios",pegword:"INFORMACIÓN PREVIA",oral:"El prestador debe informar antes de contratar: la carga de la prueba recae sobre él"},
    {tipo:"D",cod:"2000/L22/des",ep:"4.3 Derecho de desistimiento",txt:"14 días naturales sin penalización ni justificación. Excepción: seguros de viaje < 1 mes. Devolución de cantidades en 30 días",pegword:"14 DÍAS DESISTIMIENTO",oral:"El consumidor tiene 14 días para desistir sin explicaciones: capa protectora adicional sobre el ya tuitivo régimen"},
    {tipo:"D",cod:"2000/L22/rec",ep:"4.4 Reclamación y sanciones",txt:"Reclamación extrajudicial: entidades obligadas a atender. Régimen sancionador: infracciones leves, graves y muy graves. Competencia: DGSFP",pegword:"RECLAMACIÓN",oral:"El régimen sancionador cierra el sistema de protección a distancia: infracciones administrativas por incumplimiento"},
    {tipo:"J",cod:"CON.D86.a",nombre:"Protección adherente",txt:"La comercialización a distancia refuerza la protección del consumidor-adherente con desistimiento y carga de prueba invertida"},
  ]
},

T8: {
  titulo:"Disposiciones generales del contrato de seguro",
  nodos: [
    {tipo:"D",cod:"2000/LCS/2.gen",ep:"8.1 Disposiciones generales",txt:"Art. 2: imperatividad. Art. 4: nulidad sin riesgo. Art. 1: definición. Sistema de normas que protegen al asegurado como parte débil del contrato de adhesión",pegword:"SISTEMA TUITIVO",oral:"Las disposiciones generales forman un sistema tuitivo: imperatividad, nulidad sin riesgo, protección del adherente"},
    {tipo:"D",cod:"2000/LCS/3",ep:"8.2 Condiciones generales/especiales/particulares",txt:"Art. 3: generales (asegurador para pluralidad), especiales (ramo), particulares (individual). Redacción clara y precisa. Jerarquía: particular > especial > general",pegword:"JERARQUÍA",oral:"La jerarquía del art. 3 resuelve conflictos: lo particular prevalece sobre lo general"},
    {tipo:"D",cod:"2000/CC/1281-89",ep:"8.2 Interpretación",txt:"Arts. 1281-1289 CC: reglas interpretativas. Art. 1288: cláusulas oscuras contra quien las redactó (contra proferentem). En seguros: siempre contra el asegurador",pegword:"CONTRA PROFERENTEM",oral:"El art. 1288 CC se aplica con especial intensidad: lo oscuro se interpreta contra el asegurador redactor"},
    {tipo:"D",cod:"2000/LCS/3.lim",ep:"8.3 Cláusulas limitativas",txt:"Art. 3: deben destacarse de modo especial y ser aceptadas expresamente por escrito. Doble requisito acumulativo. TS exige ambos. Sin ellos: ineficaz frente al asegurado",pegword:"DOBLE FILTRO",oral:"Las limitativas necesitan destacar + aceptar por escrito: sin ambos requisitos son ineficaces"},
    {tipo:"D",cod:"2000/LCS/3.les",ep:"8.4 Cláusulas lesivas",txt:"Art. 3 in fine: nulidad de pleno derecho. Diferencia con limitativas: las lesivas son siempre nulas, las limitativas son subsanables si se cumplen los requisitos",pegword:"SIEMPRE NULAS",oral:"Las lesivas son nulas de pleno derecho sin posibilidad de subsanación: prohibición absoluta"},
    {tipo:"J",cod:"CON.D86.a",nombre:"Contrato de adhesión",txt:"Arts. 2 y 3 forman el núcleo de protección: imperatividad + control de clausulado + interpretación pro asegurado"},
    {tipo:"D",cod:"2000/LCS/10",ep:"8.5.1 Declaración del riesgo",txt:"Art. 10: deber del tomador según cuestionario. Sin dolo/culpa grave: reducción proporcional. Con dolo/culpa grave: liberación asegurador. Art. 89: indisputabilidad en vida (1 año). Olvido oncológico (RDL 5/2023: 5 años sin recaída)",pegword:"CUESTIONARIO",oral:"El art. 10 pivota sobre el cuestionario: delimita qué debe declararse y gradúa las consecuencias según culpa"},
    {tipo:"J",cod:"CON.D82.a",nombre:"Selección adversa",txt:"El cuestionario corrige la asimetría informativa precontractual: sin él, los malos riesgos dominan"},
    {tipo:"D",cod:"2000/LCS/11-12",ep:"8.5.2 Agravación del riesgo",txt:"Art. 11: deber de comunicar tan pronto como sea posible. Art. 12: asegurador puede modificar (2 meses), rescindir (1 mes) o aceptar. Reforma Ley 20/2015: variación de salud NO es agravación en personas",pegword:"2 MESES / 1 MES",oral:"Los plazos son estrictos: 2 meses para proponer modificación, 1 mes para rescindir"},
    {tipo:"D",cod:"2000/LCS/13",ep:"8.5.3 Disminución del riesgo",txt:"Art. 13: facultad (no deber) de comunicar. Reducción prima futura proporcional. Si asegurador se niega: derecho de resolución con devolución de prima",pegword:"FACULTAD",oral:"El art. 13 da al tomador una facultad, no un deber: si el riesgo baja puede exigir reducción de prima"},
    {tipo:"J",cod:"SEG.G32.b",nombre:"Riesgo dinámico",txt:"Arts. 11-13 reconocen que el riesgo cambia: el contrato debe adaptarse o terminarse"},
    {tipo:"D",cod:"2000/LCS/14-15",ep:"8.5.4 Pago de la prima",txt:"Art. 14: exigible tras firma. Art. 15: 1ª prima impagada → sin efectos hasta pago. Sucesivas: suspensión cobertura 1 mes tras vencimiento (ampliable), resolución a los 6 meses. Culpa del tomador requerida",pegword:"SIN EFECTOS / 1 MES / 6 MESES",oral:"El escalonamiento del art. 15 es clave: sin efectos → suspensión 1 mes → resolución 6 meses"},
    {tipo:"D",cod:"2000/LCS/16",ep:"8.5.5 Comunicación siniestro",txt:"Art. 16: plazo 7 días (o pactado menor). Asegurado, tomador o beneficiario. Información complementaria al requerimiento. Incumplimiento doloso → puede liberar al asegurador",pegword:"7 DÍAS",oral:"El art. 16 da 7 días: quien sabe del siniestro debe comunicarlo al asegurador"},
    {tipo:"D",cod:"2000/LCS/17",ep:"8.5.6 Deber de salvamento",txt:"Art. 17: emplear medios al alcance para aminorar consecuencias del siniestro. Gastos a cargo del asegurador. Incumplimiento: reducción de prestación si hay dolo/culpa grave",pegword:"AMINORAR",oral:"El salvamento es un deber activo: no basta con no agravar, hay que reducir las consecuencias"},
    {tipo:"D",cod:"2000/LCS/18-19",ep:"8.5.7 Pago indemnización y provocación",txt:"Art. 18: plazo 40 días, mínimo parcial si no hay acuerdo. Art. 19: mala fe del asegurado → liberación total del asegurador. Provocación dolosa como límite absoluto de la cobertura",pegword:"40 DÍAS / MALA FE",oral:"Art. 18 da 40 días para pagar; art. 19 traza el límite: el seguro cubre el azar, no la voluntad dolosa"},
    {tipo:"J",cod:"CON.D82.b",nombre:"Riesgo moral",txt:"Arts. 17 y 19 combaten el riesgo moral: salvamento como deber activo y exclusión por provocación como sanción"},
    {tipo:"D",cod:"2000/LCS/20",ep:"8.6 Mora del asegurador",txt:"Art. 20: si no paga en 3 meses → interés legal +50%. Pasados 2 años desde siniestro → mínimo 20% anual. Finalidad sancionadora/punitiva. Causa justificada exonera (necesidad de proceso judicial, discusión razonable)",pegword:"20 POR CIENTO",oral:"El art. 20 es la norma más temida: el 20% anual tiene función punitiva para disuadir la dilación"},
    {tipo:"D",cod:"2000/LCS/22",ep:"8.7.1 Duración",txt:"Art. 22: duración máxima 10 años. Prórrogas no superiores a 1 año. Denuncia con 2 meses de antelación. Excepción: seguro de vida sin límite. Nulidad de prórrogas superiores",pegword:"10 AÑOS + PRÓRROGAS",oral:"El art. 22 limita a 10 años prorrogables: la denuncia requiere 2 meses de antelación"},
    {tipo:"D",cod:"2000/LCS/23",ep:"8.7.2 Prescripción",txt:"Art. 23: 2 años para daños, 5 años para personas. Dies a quo: conocimiento del siniestro (o rechazo de la prestación por el asegurador). Interrupción por reclamación extrajudicial",pegword:"2/5 AÑOS",oral:"La diferencia 2/5 años es otra manifestación de la dualidad: en personas el plazo mayor protege al asegurado"},
    {tipo:"D",cod:"2000/LCS/24",ep:"8.8 Jurisdicción",txt:"Art. 24: juez del domicilio del asegurado. Norma imperativa, no derogable por cláusula de sumisión. Fuero protector que cierra el sistema tuitivo",pegword:"DOMICILIO ASEGURADO",oral:"El art. 24 cierra el sistema: imperatividad (2), clausulado (3), mora (20) y fuero protector (24)"},
    {tipo:"J",cod:"CON.D86.a",nombre:"Sistema tuitivo completo",txt:"El art. 24 es la última pieza: imperatividad + control clausulado + mora privilegiada + fuero protector"},
  ]
},

T9: {
  titulo:"Disposiciones generales seguros contra daños",
  nodos: [
    {tipo:"D",cod:"2000/LCS/25-44",ep:"1. Disposiciones generales sobre el contrato de seguro contra daños",txt:"Arts. 25-44 LCS, Sección 1ª Título II. Eje vertebrador: principio indemnizatorio. Los seguros de daños cubren necesidad económica concreta: la prestación es indemnización estricta",pegword:"NECESIDAD CONCRETA",oral:"El Título II se construye sobre una idea: el seguro de daños cubre una necesidad concreta, no abstracta"},
    {tipo:"D",cod:"2000/LCS/25",ep:"2. Interés asegurable",txt:"Art. 25: nulidad sin interés. Garrigues: relación económica persona-cosa. Interés ≠ objeto (concepto distinto). Debe ser lícito (arts. 1255, 1271 CC). Según tipo de riesgo: daño a cosa, aumento pasivo (RC), falta de aumento patrimonial (lucro cesante)",pegword:"RELACIÓN PERSONA-COSA",oral:"El art. 25 es el pórtico del Título II: sin interés no hay contrato. Interés, riesgo y daño son interdependientes"},
    {tipo:"D",cod:"2000/LCS/26",ep:"3. Principio indemnizatorio",txt:"Art. 26: no enriquecimiento injusto. Valor del interés al momento inmediatamente anterior al siniestro. TS 1/12/1989: indemnización limitada al daño efectivo. Doble fundamento: prevenir provocación y evitar apuesta",pegword:"NO ENRIQUECIMIENTO",oral:"El art. 26 consagra la regla capital: el seguro de daños jamás puede generar enriquecimiento injusto"},
    {tipo:"J",cod:"SEG.G22.a",nombre:"Principio indemnizatorio",txt:"Eje vertebrador del Título II. Doble fundamento: prevenir provocación del siniestro y evitar la degeneración en apuesta"},
    {tipo:"D",cod:"2000/LCS/27-28",ep:"3. Suma asegurada y póliza estimada",txt:"Art. 27: suma asegurada = límite máximo. Art. 28: póliza estimada (valor pactado previo). En vida: suma = prestación directa sin relación con daño. Valor asegurable vs. valor asegurado",pegword:"LÍMITE + ESTIMADA",oral:"La suma asegurada es techo (art. 27), pero en póliza estimada (art. 28) el valor se pacta de antemano"},
    {tipo:"D",cod:"2000/LCS/30",ep:"4. Infraseguro y regla proporcional",txt:"Art. 30: si suma < interés → indemnización proporcional. Fórmula: daño × (suma/interés). No imperativa: derogable. Alternativas: primer riesgo, póliza estimada, cláusulas de estabilización/tolerancia",pegword:"PROPORCIONAL",oral:"El art. 30 castiga al infraseguro: si aseguraste la mitad, cobras la mitad. Pero la regla es derogable"},
    {tipo:"D",cod:"2000/LCS/31",ep:"4. Sobreseguro",txt:"Art. 31: suma > interés notablemente. Cualquier parte puede reducir. Dolo → ineficacia + retención primas. Buena fe → solo reducción. Real (capital > valor cosa) vs. personal (capital > interés del asegurado)",pegword:"REDUCCIÓN O NULIDAD",oral:"El sobreseguro de buena fe se reduce; el doloso anula el contrato y el asegurador retiene las primas"},
    {tipo:"D",cod:"2000/LCS/32-33",ep:"4. Seguro múltiple y coaseguro",txt:"Art. 32: mismo interés/riesgo/período con varios aseguradores → deber de comunicar. Omisión dolosa con sobreseguro → liberación. Art. 33: coaseguro por cuotas en un solo contrato. Reaseguro: operación interna, no genera vínculo con tomador",pegword:"COMUNICAR",oral:"El art. 32 impone comunicar los demás seguros: la omisión dolosa con sobreseguro libera a todos"},
    {tipo:"D",cod:"2000/LCS/34-36",ep:"5. Transmisión del objeto",txt:"Art. 34: adquirente se subroga automáticamente. Comunicar en 15 días. Solidaridad en primas vencidas. Art. 35: asegurador puede rescindir en 15 días. Art. 36: pólizas a la orden/portador: no rescindibles por transmisión. Art. 37: muerte/concurso del tomador",pegword:"SUBROGACIÓN AUTOMÁTICA",oral:"El seguro sigue a la cosa: el adquirente entra automáticamente en el contrato (art. 34)"},
    {tipo:"D",cod:"2000/LCS/38",ep:"6. Peritación de daños",txt:"Art. 38: perito por parte + tercer perito si no hay acuerdo (designado por juez). Dictamen vinculante salvo impugnación: 30 días asegurador / 180 días asegurado. Peritos como arbitradores, no árbitros",pegword:"TERCER PERITO",oral:"La peritación del art. 38 es contradictoria: dos peritos y un tercero si discrepan. Son arbitradores, no árbitros"},
    {tipo:"D",cod:"2000/LCS/40-42",ep:"7. Derechos de acreedores",txt:"Art. 40: derechos reales (hipoteca, prenda, privilegio) se extienden a la indemnización. Art. 41: extinción no oponible 1 mes. Art. 42: reconstrucción condicionada a acuerdo asegurado-acreedores. Art. 40 imperativo",pegword:"EXTENSIÓN A INDEMNIZACIÓN",oral:"Los acreedores reales extienden su garantía a la indemnización: el art. 40 es imperativo"},
    {tipo:"D",cod:"2000/LCS/43",ep:"8. Subrogación del asegurador",txt:"Art. 43: pagada la indemnización, el asegurador ejerce derechos del asegurado vs. tercero responsable, hasta el límite de lo pagado. Ope legis. Excluidos: familiares convivientes salvo dolo/seguro propio. En infraseguro: asegurado conserva acción por la diferencia. Art. 82: prohibida en personas (excepto gastos sanitarios)",pegword:"QUIEN DAÑA PAGA",oral:"El art. 43 impide que el causante se beneficie del seguro: pagado el siniestro, el asegurador reclama al tercero"},
    {tipo:"J",cod:"SEG.G32.a",nombre:"Subrogación anti-enriquecimiento",txt:"La subrogación cierra el ciclo indemnizatorio en daños. En personas: prohibida (art. 82) salvo gastos sanitarios, confirmando la dualidad"},
  ]
},

T10: {
  titulo:"Seguros específicos sobre cosas",
  nodos: [
    {tipo:"D",cod:"2000/LCS/45-49.intro",ep:"1. Introducción a los seguros específicos sobre cosas",txt:"Los seguros de daños stricto sensu se refieren a cosas determinadas: incendio, robo, transporte. Siguen la estructura Título II LCS. Aplicación directa del principio indemnizatorio a bienes materiales",pegword:"COSAS DETERMINADAS",oral:"Los seguros de cosas aplican el principio indemnizatorio sobre bienes materiales concretos"},
    {tipo:"D",cod:"2000/LCS/45",ep:"2. Seguro de incendios: objeto",txt:"Art. 45: asegurador se obliga a indemnizar daños producidos por incendio en los objetos asegurados. Art. 46: valor al tiempo del siniestro. Incluye daños por extinción, salvamento y demolición",pegword:"INCENDIO",oral:"El incendio es el prototipo de seguro de daños: cubre los daños por fuego incluidos los de extinción y salvamento"},
    {tipo:"D",cod:"2000/LCS/48",ep:"2.3 Riesgos cubiertos y excluidos",txt:"Art. 48: cubiertos caso fortuito, negligencia propia (art. 48.1), vicio propio de la cosa. Excluidos: dolo del asegurado (art. 19), guerra, terremoto (salvo pacto, CCS). Art. 49: obligaciones del asegurado tras siniestro",pegword:"CASO FORTUITO SÍ / DOLO NO",oral:"El incendio cubre caso fortuito y negligencia, pero excluye el dolo: el art. 19 traza el límite"},
    {tipo:"J",cod:"SEG.G22.a",nombre:"Principio indemnizatorio en acción",txt:"El incendio es el prototipo histórico del principio indemnizatorio aplicado en la práctica"},
    {tipo:"D",cod:"2000/LCS/50",ep:"3. Seguro de robo: objeto y modalidades",txt:"Art. 50: sustracción ilegítima por actos de terceros. Art. 51: modalidades y extensión: expoliación, hurto, daños por tentativa. Delimitación: actos cometidos por personas con acceso legítimo pueden excluirse",pegword:"SUSTRACCIÓN",oral:"El robo cubre la sustracción ilegítima, extensible a expoliación y hurto según pacto"},
    {tipo:"D",cod:"2000/LCS/51.rgo",ep:"3.3 Delimitación del riesgo",txt:"El riesgo se delimita por: medio empleado (fuerza, intimidación), lugar (domicilio, local), tiempo (horario). Exclusiones: empleados, familiares convivientes salvo denuncia. Medidas de seguridad como condición de cobertura",pegword:"MEDIO-LUGAR-TIEMPO",oral:"La delimitación del robo opera por tres ejes: medio empleado, lugar del robo y franja temporal"},
    {tipo:"D",cod:"2000/LCS/52",ep:"3.4 Recuperación del objeto",txt:"Art. 52: si el objeto se recupera, el asegurado elige: quedárselo (devolviendo indemnización) o dejarlo al asegurador. Subrogación art. 43 tras el pago. Plazo razonable para la elección",pegword:"ELIGE",oral:"La recuperación plantea una opción al asegurado: quedarse el objeto o dejarlo al asegurador. Elige él"},
    {tipo:"D",cod:"2000/LCS/54-62",ep:"4.1 Transporte terrestre: objeto y modalidades",txt:"Arts. 54-62: mercancías en tránsito terrestre. Póliza individual (expedición concreta) y flotante (múltiples). Ámbito: desde carga hasta descarga, incluidos almacenajes intermedios. Porteador y destinatario como figuras adicionales",pegword:"TRÁNSITO",oral:"El transporte cubre mercancías desde la carga hasta la descarga, incluidos almacenajes intermedios"},
    {tipo:"D",cod:"2000/LCS/56-57",ep:"4.2 Facultad de abandono",txt:"Arts. 56-57: el asegurado puede ceder al asegurador los restos del bien dañado y cobrar la totalidad de la suma asegurada. Excepción al principio indemnizatorio. Requisitos: siniestro de cierta gravedad",pegword:"ABANDONO",oral:"El abandono es excepción al principio indemnizatorio: el asegurado cede los restos y cobra todo"},
    {tipo:"D",cod:"2000/LCS/62",ep:"4.3 Póliza flotante",txt:"Art. 62: cobertura genérica para expediciones múltiples. Cada envío se declara mediante 'abono'. Si no se declara: no hay cobertura para ese envío. Flexibilidad para empresas con tráfico regular",pegword:"FLOTANTE",oral:"La póliza flotante cubre múltiples expediciones bajo un mismo marco: cada envío se 'abona' individualmente"},
    {tipo:"J",cod:"SEG.G22.e",nombre:"Origen marítimo",txt:"Abandono y póliza flotante son instituciones de origen marítimo que perviven en transporte terrestre → enlaza T18"},
  ]
},

T11: {
  titulo:"Seguros sobre el patrimonio",
  nodos: [
    {tipo:"D",cod:"2000/LCS/63-72.intro",ep:"1. Seguros sobre el patrimonio",txt:"Distinción seguros de daños stricto sensu vs. patrimoniales. Olivencia: solo RC y reaseguro son patrimoniales puros. Incluyen lucro cesante, caución y crédito por proteger el patrimonio frente a contingencias de terceros",pegword:"PATRIMONIO",oral:"Los patrimoniales no protegen cosas sino el patrimonio: la pérdida no tiene reflejo concreto inmediato"},
    {tipo:"D",cod:"2000/LCS/63",ep:"2.1 Lucro cesante: objeto",txt:"Art. 63: indemnizar la pérdida de rendimiento económico que se hubiera alcanzado de no producirse el siniestro. Primera aparición en Dcho positivo español. Cubre una expectativa: beneficio esperado. Tensión con art. 26 (no enriquecimiento)",pegword:"RENDIMIENTO ESPERADO",oral:"El lucro cesante cubre una expectativa de beneficio: la tensión con el art. 26 la resuelve Garrigues distinguiendo lucro lícito"},
    {tipo:"D",cod:"2000/LCS/64",ep:"2.2 Concurrencia daño emergente y lucro cesante",txt:"Art. 64: deber de comunicar otros seguros sobre mismo objeto. Art. 1106 CC: indemnización incluye daño sufrido y ganancia dejada de obtener. Se puede asegurar daño emergente y lucro cesante conjuntamente",pegword:"1106 CC",oral:"El art. 1106 CC permite asegurar conjuntamente daño emergente y lucro cesante: la LCS lo recoge en el art. 64"},
    {tipo:"D",cod:"2000/LCS/66",ep:"2.3 Pérdida de beneficios por paralización",txt:"Art. 66: pérdida de beneficios + gastos generales que continúen durante paralización. Causas: incendio, avería, fallo de suministros. Periodo indemnizable pactado (máx. 24 meses habitual). Modalidad: pérdida de tiempo. Definiciones: beneficio bruto, neto, volumen de negocio",pegword:"PARALIZACIÓN",oral:"La pérdida de beneficios cubre el impacto económico de la paralización: periodo pactado como límite"},
    {tipo:"D",cod:"2000/LCS/67",ep:"2.4 Predeterminación de la indemnización",txt:"Art. 67: prohíbe predeterminar la indemnización cuando el contrato sea exclusivamente de pérdida de beneficios. Teorías de causalidad: causa próxima, adecuada, necesaria. Criterio de la probabilidad para cuantificar",pegword:"NO PREDETERMINAR",oral:"El art. 67 impide fijar de antemano la indemnización en pérdida de beneficios pura: hay que calcularla tras el siniestro"},
    {tipo:"D",cod:"2000/LCS/68",ep:"3.1 Seguro de caución: concepto",txt:"Art. 68: asegurador indemniza al asegurado por incumplimiento del tomador, a título de resarcimiento o penalidad. Todo pago será reembolsado por el tomador. Tres sujetos: asegurador, tomador (deudor), asegurado (acreedor). Dos relaciones jurídicas diferenciadas",pegword:"INCUMPLIMIENTO DEL TOMADOR",oral:"En caución el siniestro es el incumplimiento del tomador: la paradoja es que quien paga la prima causa el daño"},
    {tipo:"D",cod:"2000/LCS/68.cv",ep:"3.1.1 Caución vs. crédito",txt:"En crédito: tomador y asegurado pueden coincidir; siniestro = insolvencia definitiva. En caución: tomador ≠ asegurado (esencial); siniestro = mero incumplimiento. Semejanza: ambos protegen un crédito",pegword:"INSOLVENCIA ≠ INCUMPLIMIENTO",oral:"Caución cubre incumplimiento y crédito cubre insolvencia: la distinción es clave para todo el régimen"},
    {tipo:"D",cod:"2000/LCS/68.fi",ep:"3.1.2 Diferencias con la fianza",txt:"Naturaleza de seguro confirmada por TS. Argumentos: indemnizatorio (art. 68 resarcimiento/penalidad) vs. fiador que paga/cumple (art. 1822 CC). No accesoriedad (art. 1824 CC: fianza requiere obligación válida). No excusión. Onerosidad esencial vs. gratuidad natural. Caso fortuito: STS 30/7/1991 condenó a aseguradora. Autonomía",pegword:"5 DIFERENCIAS",oral:"Caución se separa de fianza por cinco ejes: indemnización, no accesoriedad, no excusión, onerosidad y caso fortuito"},
    {tipo:"D",cod:"2000/CC/1822-24",ep:"3.1.2 Fianza CC",txt:"Art. 1822: fiador paga por tercero si no lo hace. Art. 1824: no puede existir sin obligación válida (accesoriedad). Art. 1826: se obliga a menos, no a más. Art. 1847: se extingue con la obligación principal",pegword:"ACCESORIEDAD",oral:"La fianza es accesoria (art. 1824) y subsidiaria: la caución es autónoma y solidaria"},
    {tipo:"J",cod:"CON.D82.b",nombre:"Riesgo moral en caución",txt:"El tomador puede provocar el siniestro → riesgo moral estructural. El reembolso del art. 68 in fine lo mitiga"},
    {tipo:"D",cod:"2000/LCS/68.reg",ep:"3.2 Régimen jurídico",txt:"Principio indemnizatorio intenso: nadie se enriquece. Acción de regreso: art. 68 in fine (acción propia, no subrogación art. 43). Siniestro: indemnización prefijada, provocado por tomador (art. 19 habla de asegurado), mero incumplimiento incluso caso fortuito (STS 21/4/1989, 30/7/1991). Cláusulas de primer requerimiento: pago por mero requerimiento sin prueba (STS 14/11/1989, 7/4/1992)",pegword:"PRIMER REQUERIMIENTO",oral:"Las cláusulas de primer requerimiento obligan a pagar sin prueba: el TS las admite como garantías independientes"},
    {tipo:"D",cod:"2000/LCS/68.mod",ep:"3.3 Modalidades",txt:"Ante AAPP: régimen especial Ley 20/2015 (impago prima no resuelve, excepciones del tomador inoponibles). Garantía de oferta/licitación. Garantía de ejecución. Mantenimiento/calidad. Cantidades anticipadas en viviendas. Garantía de alquiler. Garantías financieras legales",pegword:"AAPP + PRIVADO",oral:"Las modalidades van desde garantías ante la Administración hasta cantidades anticipadas en viviendas"},
    {tipo:"D",cod:"2000/LCS/69",ep:"4.1 Seguro de crédito: concepto",txt:"Art. 69: asegurador indemniza pérdidas finales por insolvencia definitiva de deudores. Asegurado = titular del crédito (normalmente coincide con tomador y beneficiario). Interés: un crédito con independencia de su origen. Doctrina dividida: ¿la invalidez del crédito impide la cobertura?",pegword:"INSOLVENCIA DEFINITIVA",oral:"El seguro de crédito cubre la insolvencia definitiva: no el mero impago sino la imposibilidad de cobrar"},
    {tipo:"D",cod:"2000/LCS/70",ep:"4.2 La insolvencia del deudor",txt:"Art. 70: supuestos de insolvencia definitiva: quiebra firme, convenio con quita, ejecución sin bienes bastantes, acuerdo asegurador-asegurado de incobrabilidad. Ley 22/2003 Concursal actualiza conceptos. Anticipo 50% a los 6 meses del impago (Olivencia: impropio, Tirado: insolvencia provisional)",pegword:"4 SUPUESTOS",oral:"El art. 70 enumera cuatro supuestos de insolvencia definitiva, actualizados por la Ley Concursal"},
    {tipo:"D",cod:"2000/LCS/71",ep:"4.3 Pérdida final",txt:"Art. 71: indemnización = % pactado de (crédito impagado + gastos recobro + procesales), mínimo 50% de pérdida final. No incluye intereses de demora ni lucro cesante. Regla del porcentaje parcial (origen Lloyd's): evita concesión excesiva de crédito y desinterés en persecución del deudor",pegword:"MÍNIMO 50%",oral:"El art. 71 exige que el asegurador cubra al menos el 50% de la pérdida final: el resto incentiva la diligencia del asegurado"},
    {tipo:"D",cod:"2000/LCS/72",ep:"4.4 Deberes del asegurado y tomador",txt:"Art. 72: exhibir libros y documentos al asegurador. Colaborar en procedimientos judiciales. Asegurador asume dirección jurídica exclusiva. Posible cesión del crédito al asegurador tras indemnización (¿subrogación art. 43?)",pegword:"EXHIBIR Y COLABORAR",oral:"El asegurado debe abrir sus libros al asegurador y colaborar en la persecución del deudor"},
    {tipo:"J",cod:"SEG.G22.a",nombre:"Principio indemnizatorio en patrimonio",txt:"En caución y crédito el principio indemnizatorio se tensiona: 'resarcimiento o penalidad' (art. 68) y pérdida final parcial (art. 71)"},
  ]
},

T12: {
  titulo:"Seguro de RC y defensa jurídica",
  nodos: [
    {tipo:"D",cod:"2000/CC/1911",ep:"1. El seguro de responsabilidad civil / 1.1 Planteamiento",txt:"Art. 1911 CC: responsabilidad patrimonial universal. Art. 1902 CC: obligación de reparar por culpa/negligencia. Daños: personales, materiales, lucro cesante, morales. Vías: extrajudicial y judicial",pegword:"QUIEN CAUSA DAÑO REPARA",oral:"El fundamento arranca del art. 1902 CC y la responsabilidad universal del art. 1911"},
    {tipo:"D",cod:"2000/LCS/73",ep:"1.2 Concepto RC",txt:"Art. 73: asegurador cubre riesgo de nacimiento de deuda de RC del asegurado frente a tercero. Seguro de daños patrimonial. Se aplican arts. 1-24, 25-44 y 73-76. Dos corrientes: delimitación ilimitada vs. delimitada por condiciones",pegword:"DEUDA DE RC",oral:"En RC el asegurador cubre una relación de responsabilidad: no protege una cosa sino un patrimonio frente a reclamaciones"},
    {tipo:"D",cod:"2000/LCS/73.rgo",ep:"1.3 Riesgo en RC",txt:"Art. 73: posibilidad de que el patrimonio del asegurado se grave con deuda indemnizatoria. Tres notas: nacimiento de obligación, a favor de tercero, por hecho civilmente imputable",pegword:"GRAVAMEN PATRIMONIAL",oral:"El riesgo en RC es que nazca una deuda: el patrimonio del asegurado queda gravado por la reclamación"},
    {tipo:"D",cod:"2000/LCS/73.cm",ep:"1.4 Siniestro y claim made",txt:"Debate: ¿siniestro = hecho dañoso o reclamación? Garrigues: combinación de tres factores (hecho, responsabilidad, reclamación). Cláusulas claim made: limitan cobertura a reclamaciones durante vigencia. Base de cobertura temporal. Validez discutida: TS ha admitido con matices. Cláusulas retroactivas y de extensión post-contractual",pegword:"¿HECHO O RECLAMACIÓN?",oral:"Las claim made son el debate central: ¿el siniestro es cuando ocurre el daño o cuando te reclaman?"},
    {tipo:"J",cod:"SEG.G22.d",nombre:"Delimitación temporal",txt:"La delimitación temporal del siniestro en RC es el debate más vivo del Título II"},
    {tipo:"D",cod:"2000/LCS/23.rc",ep:"1.5 Prescripción en RC",txt:"Art. 23 LCS: 2 años (daños). Art. 1964 CC (modificado Ley 42/2015): 5 años acciones personales. Art. 1968 CC: 1 año RC extracontractual. Interacción entre plazos del seguro y de la RC subyacente",pegword:"2 + 5 + 1 AÑOS",oral:"En RC interactúan tres prescripciones: 2 años del seguro, 5 de acciones personales y 1 de RC extracontractual"},
    {tipo:"D",cod:"2000/LCS/74",ep:"1.6 Dirección jurídica",txt:"Art. 74: asegurador asume dirección jurídica de la defensa frente a reclamación del perjudicado. Posible conflicto de intereses con el asegurado. El asegurado puede intervenir con abogado propio si hay conflicto",pegword:"DIRECCIÓN",oral:"El asegurador dirige la defensa (art. 74) pero si hay conflicto de intereses el asegurado puede intervenir con abogado propio"},
    {tipo:"D",cod:"2000/LCS/76",ep:"1.7 Acción directa",txt:"Art. 76: perjudicado tiene acción directa contra asegurador. Inoponibilidad de excepciones personales contra el asegurado. Asegurador puede oponer: culpa exclusiva del perjudicado + excepciones personales contra él. Asegurado debe informar al perjudicado de la existencia del contrato",pegword:"PERJUDICADO → ASEGURADOR",oral:"El art. 76 rompe la relatividad contractual: el perjudicado accede directamente al patrimonio del asegurador"},
    {tipo:"J",cod:"REG.K20.a",nombre:"Ruptura relatividad contractual",txt:"La acción directa es la mayor excepción al art. 1257 CC en el Derecho privado español"},
    {tipo:"D",cod:"2000/LCS/76.rep",ep:"1.8 Derecho de repetición",txt:"Asegurador puede repetir contra asegurado si el siniestro fue causado por conducta dolosa de este. Límite del art. 76: la inoponibilidad protege al perjudicado, no al asegurado doloso",pegword:"REPETICIÓN",oral:"El derecho de repetición equilibra: el perjudicado cobra siempre, pero el asegurador recupera del asegurado doloso"},
    {tipo:"D",cod:"2000/LCS/76a",ep:"2.1-2.2 Defensa jurídica: antecedentes y concepto",txt:"Arts. 76a-76g (Ley 21/1990, transpone Directiva 87/344/CEE). Art. 76a: asegurador se obliga a hacerse cargo de gastos y prestar servicios derivados de la cobertura jurídica. Seguro autónomo, no complemento de RC",pegword:"GASTOS + SERVICIOS",oral:"La defensa jurídica es seguro autónomo: cubre gastos de defensa y presta servicios jurídicos"},
    {tipo:"D",cod:"2000/LCS/76b-c",ep:"2.3 Forma de prestación y exclusiones",txt:"Art. 76b: tres formas de prestación (gestión directa, libre elección con límite de gastos, mixta). Art. 76c: exclusiones (responsabilidad derivada de conducta dolosa, materias excluidas expresamente en póliza). Exclusión de conflictos con el propio asegurador",pegword:"3 FORMAS",oral:"La prestación puede ser directa, con libre elección o mixta; siempre se excluye la conducta dolosa"},
    {tipo:"D",cod:"2000/LCS/76d-e",ep:"2.4-2.5 Libre designación de abogado y procurador",txt:"Art. 76d: derecho a elegir abogado y procurador libremente cuando exista conflicto de intereses o procedimiento judicial/administrativo. Art. 76e: el abogado designado debe tener habilitación legal. Derecho irrenunciable del asegurado",pegword:"LIBRE ELECCIÓN",oral:"La libre elección de abogado es irrenunciable cuando hay conflicto de intereses o procedimiento judicial"},
    {tipo:"D",cod:"2000/LCS/76f-g",ep:"2.6 Deberes del asegurado",txt:"Art. 76f: comunicar al asegurador la intención de ejercitar la libre designación. Art. 76g: procedimiento de resolución de conflictos entre asegurado y asegurador sobre la prestación del servicio",pegword:"COMUNICAR",oral:"El asegurado que quiera elegir abogado debe comunicarlo al asegurador y seguir el procedimiento del art. 76f-g"},
    {tipo:"J",cod:"CON.D86.a",nombre:"Protección del asegurado",txt:"La libre elección de abogado protege la autonomía del asegurado frente al asegurador que dirige la defensa"},
  ]
},

T13: {
  titulo:"Seguros de personas y seguro de vida (general)",
  nodos: [
    {tipo:"D",cod:"2000/LCS/80",ep:"1. Concepto, clases y diferencias con daños",txt:"Art. 80: seguros sobre las personas. Modalidades: vida, accidentes, enfermedad, asistencia sanitaria, decesos, dependencia. Diferencias con daños: no principio indemnizatorio, no subrogación, acumulación de prestaciones posible, prestación convenida (no indemnización estricta)",pegword:"RUPTURA: NO INDEMNIZACIÓN",oral:"El Título III abre con una ruptura: en personas la prestación no mide el daño sino lo convenido"},
    {tipo:"J",cod:"SEG.G22.b",nombre:"Teoría dualista confirmada",txt:"La ausencia de principio indemnizatorio y subrogación confirma que daños y personas son regímenes distintos"},
    {tipo:"D",cod:"2000/LCS/80.noc",ep:"2.1 Noción de seguros sobre las personas",txt:"Art. 80: seguros que tienen por objeto la persona humana. Riesgos: vida, integridad corporal, salud. El asegurado es la persona sobre la que recae el riesgo (asegurado impropio en seguros de vida)",pegword:"PERSONA HUMANA",oral:"El objeto asegurado ya no es una cosa sino la persona humana: vida, integridad y salud"},
    {tipo:"D",cod:"2000/LCS/80.grp",ep:"2.2 Seguros de grupo",txt:"Tomador ≠ asegurados. Póliza colectiva: empresa como tomador por cuenta de empleados. Información individualizada a cada asegurado. Regulación: art. 7 LCS + Ley 20/2015",pegword:"COLECTIVO",oral:"En seguros de grupo la empresa toma por cuenta de sus empleados: cada asegurado debe ser informado individualmente"},
    {tipo:"D",cod:"2000/LCS/82",ep:"2.3 Ausencia de subrogación",txt:"Art. 82: prohibida la subrogación en seguros de personas. Excepción: gastos de asistencia sanitaria (se asimilan a daños). Fundamento: la prestación no repara un daño tasable. Zona gris: accidentes participan de ambos regímenes",pegword:"PROHIBIDA SALVO SANITARIOS",oral:"El art. 82 prohíbe la subrogación en personas, pero exceptúa los gastos sanitarios que se asimilan a daños"},
    {tipo:"J",cod:"SEG.G32.a",nombre:"Subrogación dual",txt:"La prohibición del art. 82 confirma la dualidad: en personas no hay daño tasable que recuperar del tercero"},
    {tipo:"D",cod:"2000/LCS/83",ep:"3. Clases de seguro de vida",txt:"Art. 83: para caso de muerte, supervivencia, mixtos. Unit-linked (prestación vinculada a inversiones). Art. 83 exige consentimiento escrito del asegurado para seguro de muerte sobre tercero. Seguros individuales y colectivos",pegword:"MUERTE / SUPERVIVENCIA / MIXTO",oral:"Las clases despliegan todo el espectro: protección pura (muerte), ahorro (supervivencia), combinación (mixto)"},
    {tipo:"D",cod:"2000/LCS/83.sel",ep:"4. Selección de riesgos en vida",txt:"Cuestionario de salud como instrumento principal. Tablas de mortalidad y supervivencia. Técnica actuarial: prima natural vs. nivelada. Exámenes médicos. Declaración de profesión y hábitos. Art. 10 aplicable vía art. 89",pegword:"CUESTIONARIO DE SALUD",oral:"La selección de riesgos en vida es la aplicación más intensa del mecanismo anti-selección adversa"},
    {tipo:"J",cod:"CON.D82.a",nombre:"Selección adversa en vida",txt:"El cuestionario de salud es la defensa principal contra la selección adversa: los malos riesgos buscan más el seguro de vida"},
    {tipo:"D",cod:"2000/LCS/95-96",ep:"5. Los valores garantizados: fundamento y régimen jurídico",txt:"Nacen de la provisión matemática acumulada. Provisión = diferencia entre prima cobrada (nivelada) y riesgo real (natural creciente). Es capital del tomador retenido por el asegurador",pegword:"PROVISIÓN MATEMÁTICA",oral:"Los valores garantizados nacen de la provisión matemática: dinero del tomador que el asegurador retiene"},
    {tipo:"D",cod:"2000/LCS/96",ep:"5.A) El derecho de rescate",txt:"Art. 96: el tomador puede resolver anticipadamente y recuperar el valor de rescate (provisión matemática menos penalizaciones). Derecho personalísimo. No ejercitable si beneficiario irrevocable",pegword:"RESCATE",oral:"El rescate permite al tomador resolver y recuperar su provisión: es la salida anticipada del contrato"},
    {tipo:"D",cod:"2000/LCS/95",ep:"5.B) El derecho de reducción",txt:"Art. 95: el tomador deja de pagar primas pero mantiene el seguro con suma asegurada inferior. La prima ya pagada financia una cobertura reducida. Alternativa al rescate",pegword:"REDUCCIÓN",oral:"La reducción mantiene el seguro sin pagar más: la suma asegurada baja en proporción a lo ya pagado"},
    {tipo:"D",cod:"2000/LCS/97",ep:"5.C) El derecho al anticipo sobre las pólizas",txt:"Art. 97: el tomador puede obtener un préstamo con garantía de la póliza. El asegurador presta hasta el valor de rescate. El contrato sigue vigente",pegword:"PRÉSTAMO SOBRE PÓLIZA",oral:"El anticipo es un préstamo del asegurador al tomador con la póliza como garantía: el contrato no se extingue"},
    {tipo:"D",cod:"2000/LCS/99",ep:"5.D) La cesión y pignoración de la póliza",txt:"Art. 99: la póliza puede cederse o darse en prenda. La cesión transmite la titularidad del contrato. La pignoración da al acreedor un derecho real sobre el valor de rescate",pegword:"CESIÓN / PRENDA",oral:"La póliza es un activo: puede cederse (transmitir) o pignorarse (dar en garantía) conforme al art. 99"},
  ]
},

T14: {
  titulo:"Aspectos específicos del seguro de vida",
  nodos: [
    {tipo:"D",cod:"2000/LCS/83.cap",ep:"1. La protección de menores e incapaces / 1.1 Complemento de la incapacidad del menor",txt:"Art. 83: menor como asegurado de muerte requiere consentimiento + autorización de representantes legales. 4 reglas según posición del menor (tomador-asegurado / asegurado distinto / mayor-menor de 14 / mixtos)",pegword:"CONSENTIMIENTO + AUTORIZACIÓN",oral:"Si el menor es asegurado de un seguro de muerte se necesita doble protección: consentimiento y autorización de representantes"},
    {tipo:"D",cod:"2000/LCS/83.proh",ep:"1.2 Prohibición <14 años e incapacitados",txt:"Art. 83 párrafo 7º: prohibición absoluta de contratar seguro de muerte sobre menor de 14 años o incapacitado. Excepción: cobertura muerte ≤ prima pagada o valor rescate. No alcanza supervivencia. Nulidad pleno derecho (arts. 6.3, 1255 CC)",pegword:"PROHIBICIÓN ABSOLUTA",oral:"La ley prohíbe absolutamente asegurar la muerte de menores de 14 años: nulidad de pleno derecho"},
    {tipo:"D",cod:"2000/LCS/84",ep:"2.1-2.2 Beneficiario: naturaleza y designación",txt:"Estipulación a favor de tercero (art. 1257 CC). Derecho propio, autónomo, originario. No necesita aceptar. Designación: en póliza, escrito posterior comunicado al asegurador (o agente), testamento. Sin beneficiario designado: patrimonio del tomador",pegword:"DERECHO PROPIO",oral:"El beneficiario tiene un derecho propio nacido del contrato: no depende de la herencia ni necesita aceptar"},
    {tipo:"D",cod:"2000/LCS/85-86",ep:"2.3 Reglas de determinación",txt:"Art. 85: 'hijos' = descendientes con derecho a herencia (excluidos hijos de premuertos). 'Herederos' = testamentarios y legales, incluido Estado. 'Cónyuge' = al momento del fallecimiento (no si separación/divorcio/nulidad). Art. 86: reparto por partes iguales (salvo pacto); derecho de acrecer entre cobeneficiarios sin pacto en contrario",pegword:"HIJOS-HEREDEROS-CÓNYUGE",oral:"Las reglas de interpretación del art. 85-86 prevalecen sobre las del CC: 'hijos' incluye todos los descendientes con derecho"},
    {tipo:"D",cod:"2000/LCS/87",ep:"2.4 Revocación",txt:"Art. 87: revocable en cualquier momento salvo renuncia expresa y escrita. Misma forma que la designación. No requiere consentimiento del asegurador ni nombramiento de sustituto. Revocación tácita: impago, rescate, cesión/pignoración (art. 99). Irrevocable: pierde derechos de rescate, anticipo, reducción y pignoración",pegword:"REVOCABLE SALVO RENUNCIA",oral:"La designación es revocable: solo la renuncia expresa y escrita la hace irrevocable, con pérdida de derechos del tomador"},
    {tipo:"D",cod:"2000/LCS/88",ep:"2.5 Protección y límites",txt:"Art. 88: prestación al beneficiario aun contra herederos y acreedores del tomador. Pero: herederos legitimarios pueden reclamar primas (donación inoficiosa, art. 636 CC). Acreedores: acción pauliana (art. 1111 CC) hasta primas pagadas. Insolvencia del tomador: soluciones variables",pegword:"AUN CONTRA HEREDEROS",oral:"El art. 88 blinda al beneficiario: cobra aunque herederos y acreedores reclamen, salvo fraude o legítima"},
    {tipo:"D",cod:"2000/LCS/89",ep:"3. Declaración del riesgo e indisputabilidad",txt:"Art. 89: se aplica art. 10 (cuestionario) y arts. 11-12 (agravación, pero empeoramiento de salud NO es agravación). Indisputabilidad: transcurrido 1 año, asegurador no puede impugnar salvo dolo del tomador. Opera ex lege. No cabe pacto de plazo superior. Art. 90: declaración inexacta de edad (régimen especial)",pegword:"1 AÑO BLINDA",oral:"La indisputabilidad del art. 89 consolida el contrato tras 1 año: solo el dolo del tomador puede romperlo"},
    {tipo:"J",cod:"CON.K12.b",nombre:"Consolidación contractual",txt:"Tensión buena fe vs. seguridad jurídica: la indisputabilidad la resuelve a favor de la estabilidad del contrato"},
    {tipo:"D",cod:"2000/LCS/91-93",ep:"4. Riesgos excluidos y suicidio",txt:"Art. 91: asegurador solo se libera por circunstancias expresamente excluidas. Art. 44: riesgos extraordinarios excluidos salvo pacto (CCS competente). Art. 92: muerte dolosa por beneficiario → pierde derecho (prestación al tomador). Art. 93: suicidio cubierto tras 1 año, dispositivo. Definición: muerte consciente y voluntaria. Enajenación mental excluye suicidio",pegword:"CONSCIENTE Y VOLUNTARIO",oral:"El art. 93 define suicidio como muerte consciente y voluntaria: la enajenación mental lo excluye. Es norma dispositiva"},
    {tipo:"D",cod:"2000/L2005/reg",ep:"5.1-5.4 Registro de seguros de fallecimiento",txt:"Ley 20/2005: registro público, Ministerio de Justicia. Gestión en Registro de actos de última voluntad. Ámbito: vida con muerte + accidentes con muerte. Excluidos: compromisos pensiones, mutualidades. Inscripción semanal. Acceso: tras 15 días del fallecimiento + certificado defunción. Certificado en 7 días hábiles. Datos 5 años",pegword:"15 DÍAS + 7 HÁBILES",oral:"El Registro resuelve un problema grave: beneficiarios que no saben que tienen derecho. Acceso tras 15 días del fallecimiento"},
    {tipo:"D",cod:"2000/L2005/dgsfp",ep:"5.5 DGSFP y sanciones",txt:"Comunicación semanal a DGSFP de entidades cumplidoras. Requerimientos y auditorías. Incumplimiento: infracción administrativa conforme a Ley 20/2015",pegword:"INFRACCIÓN",oral:"El incumplimiento de la obligación de inscripción es infracción administrativa: la DGSFP supervisa"},
    {tipo:"D",cod:"2000/LCS/DA4",ep:"6.1 No discriminación por discapacidad",txt:"DA 4ª LCS (Ley 26/2011): prohibición general para todos los ramos. Prohibiciones particulares: acceso, procedimientos, condiciones onerosas. Excepción: causas justificadas, proporcionadas, razonables, documentadas objetivamente. Verificables por supervisor",pegword:"JUSTIFICADAS Y PROPORCIONADAS",oral:"La DA 4ª prohíbe discriminar pero admite excepciones: deben ser justificadas, proporcionadas y documentadas"},
    {tipo:"D",cod:"2000/LCS/DA5",ep:"6.2 VIH/SIDA y olvido oncológico",txt:"DA 5ª (Ley 4/2018): no discriminación por VIH/SIDA u otras condiciones de salud. Misma estructura que DA 4ª. RDL 5/2023 art. 209: olvido oncológico → 5 años sin recaída, no obligado a declarar. Art. 10 in fine: exención de declarar. Nulidad de cláusulas excluyentes. Gobierno puede modificar plazos por evidencia científica",pegword:"5 AÑOS SIN RECAÍDA",oral:"El olvido oncológico marca la frontera: tras 5 años sin recaída, los antecedentes oncológicos no existen para el seguro"},
    {tipo:"J",cod:"CON.D82.c",nombre:"Límites a la selección de riesgos",txt:"Los derechos fundamentales limitan la selección adversa: discapacidad, VIH y olvido oncológico como nueva frontera"},
  ]
},

T15: {
  titulo:"Seguro de accidentes, enfermedad, decesos y dependencia",
  nodos: [
    {tipo:"D",cod:"2000/LCS/100",ep:"1. El seguro de accidentes / 1.1 Régimen jurídico",txt:"Arts. 100-104: lesión corporal por causa violenta, súbita, externa e involuntaria. Se aplican disposiciones generales de personas (arts. 80-82) y, en lo no previsto, las de vida. Seguro de sumas, no de daños",pegword:"4 NOTAS ACUMULATIVAS",oral:"El accidente requiere cuatro notas acumulativas: violento, súbito, externo e involuntario"},
    {tipo:"D",cod:"2000/LCS/100.del",ep:"1.2 Delimitación del riesgo",txt:"Accidente ≠ enfermedad. Excluidos: actos voluntarios, imprudencia temeraria (salvo pacto), enfermedades preexistentes. Zona gris: infarto por esfuerzo, caída por mareo, golpe de calor. Variación de salud NO es agravación (reforma art. 11 Ley 20/2015)",pegword:"FRONTERA",oral:"La frontera accidente/enfermedad es la cuestión más litigada: ¿el infarto por esfuerzo es accidente?"},
    {tipo:"J",cod:"SEG.G22.b",nombre:"Zona gris de la dualidad",txt:"El accidente está entre daños y personas: seguro de personas pero con prestaciones que pueden parecer indemnizatorias"},
    {tipo:"D",cod:"2000/LCS/100.cum",ep:"1.3.1 Cúmulo de seguros",txt:"Deber de comunicar la existencia de otros seguros de accidentes sobre la misma persona. Diferencia con art. 32 (seguro múltiple en daños): en personas la acumulación es lícita",pegword:"ACUMULAR ES LÍCITO",oral:"En accidentes se puede cobrar de varios seguros: la acumulación es lícita porque no rige el principio indemnizatorio"},
    {tipo:"D",cod:"2000/LCS/100.dol",ep:"1.3.2 Causación dolosa",txt:"Art. 19 aplicable: mala fe del asegurado libera al asegurador. En accidentes: autolesión deliberada. La carga de la prueba del dolo recae sobre el asegurador",pegword:"AUTOLESIÓN",oral:"La provocación dolosa del accidente (autolesión) libera al asegurador: la carga de probarlo es suya"},
