<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Transversal LCS — Temas 5–18</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #06070b;
  --bg-base: #0b0d14;
  --bg-card: #10121c;
  --bg-elevated: #161a28;
  --border: #1c2035;
  --border-hover: #2a3050;
  --text-primary: #eaedf5;
  --text-secondary: #8b90ab;
  --text-muted: #555b78;
  --accent-indigo: #818cf8;
  --accent-violet: #a78bfa;
  --accent-amber: #fbbf24;
  --accent-emerald: #34d399;
  --accent-rose: #fb7185;
  --accent-cyan: #22d3ee;
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body: 'Outfit', 'Segoe UI', sans-serif;
  --font-mono: 'IBM Plex Mono', 'Fira Code', monospace;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Subtle grain overlay */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

.app { position: relative; z-index: 1; }

/* ═══ HEADER ═══ */
.header {
  position: sticky; top: 0; z-index: 100;
  background: linear-gradient(180deg, rgba(11,13,20,0.97) 0%, rgba(6,7,11,0.95) 100%);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
}
.header-top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.header-title {
  font-family: var(--font-display);
  font-size: 24px; font-weight: 800;
  background: linear-gradient(135deg, #818cf8 0%, #fbbf24 50%, #34d399 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-sub {
  font-size: 11px; color: var(--text-muted);
  letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px;
}

/* Tab bar */
.tab-bar {
  display: flex; gap: 3px;
  background: var(--bg-base); border-radius: 8px; padding: 3px;
  border: 1px solid var(--border);
}
.tab-btn {
  padding: 7px 18px; border-radius: var(--radius-sm); border: none;
  cursor: pointer; font-family: var(--font-body); font-size: 13px; font-weight: 600;
  background: transparent; color: var(--text-muted); transition: all 0.2s;
}
.tab-btn.active { background: var(--bg-elevated); color: var(--text-primary); }
.tab-btn:hover:not(.active) { color: var(--text-secondary); }

/* Filters */
.filters { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
.search-input {
  background: var(--bg-base); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 6px 12px; color: var(--text-primary); font-size: 13px; font-family: var(--font-body);
  width: 280px; outline: none; transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--accent-indigo); }
.search-input::placeholder { color: var(--text-muted); }
.filter-group { display: flex; gap: 4px; }
.filter-btn {
  padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer;
  font-family: var(--font-body); transition: all 0.15s; background: transparent;
}

/* ═══ MAIN ═══ */
.main { padding: 20px 24px; max-width: 1440px; margin: 0 auto; }

/* ═══ BLOQUES VIEW ═══ */
.bloques-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 16px; margin-bottom: 24px; }
.bloque-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 20px; cursor: pointer; transition: all 0.3s;
  position: relative; overflow: hidden;
}
.bloque-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
}
.bloque-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
.bloque-card.selected { border-color: var(--border-hover); }
.bloque-num {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-weight: 800; font-size: 18px;
}
.bloque-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.bloque-title { font-family: var(--font-display); font-size: 17px; font-weight: 700; color: var(--text-primary); }
.bloque-desc { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
.tema-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
.tema-tag {
  padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600;
  white-space: nowrap;
}
.bloque-stats { display: flex; gap: 16px; font-size: 12px; color: var(--text-muted); }

/* Ejes grid */
.ejes-section-title {
  font-family: var(--font-display); font-size: 16px; font-weight: 700;
  color: var(--text-primary); margin-bottom: 14px; margin-top: 8px;
}
.ejes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 10px; }

/* Eje card */
.eje-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md);
  padding: 14px; cursor: pointer; transition: all 0.25s; position: relative;
  border-left: 3px solid transparent;
}
.eje-card:hover { border-color: var(--border-hover); transform: translateY(-1px); }
.eje-card.puente { border-right: 2px dashed var(--accent-amber); }
.eje-cat-label { font-size: 11px; font-weight: 600; margin-bottom: 4px; }
.eje-name { font-family: var(--font-display); font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
.eje-temas { display: flex; gap: 4px; flex-wrap: wrap; }
.puente-badge {
  position: absolute; top: 8px; right: 8px; font-size: 13px;
}

/* ═══ MATRIZ VIEW ═══ */
.matriz-wrap { overflow-x: auto; }
.matriz-table { border-collapse: collapse; width: 100%; min-width: 950px; }
.matriz-table th {
  padding: 8px 6px; font-family: var(--font-body); font-weight: 600; font-size: 11px;
  color: var(--text-muted); border-bottom: 1px solid var(--border); text-align: center;
  position: sticky; top: 0; background: var(--bg-deep); z-index: 2;
}
.matriz-table th:first-child { text-align: left; width: 220px; }
.matriz-table td { padding: 3px 2px; text-align: center; }
.matriz-table td:first-child { padding: 6px 8px; text-align: left; }
.matriz-table tr { border-bottom: 1px solid rgba(28,32,53,0.3); }
.matriz-cell {
  width: 40px; height: 28px; border-radius: 4px; margin: 0 auto; cursor: pointer;
  transition: all 0.15s; border: 1px solid transparent;
}
.matriz-cell:hover { transform: scale(1.15); }
.matriz-cell.selected { border-width: 2px; }
.matriz-cell.empty { background: var(--bg-base); cursor: default; }
.matriz-cell.empty:hover { transform: none; }
.matriz-eje-name { display: flex; align-items: center; gap: 6px; cursor: pointer; }
.matriz-eje-name:hover .eje-name-text { color: var(--accent-indigo); }
.eje-name-text { font-size: 12px; font-weight: 600; color: var(--text-primary); transition: color 0.15s; }
.sigma-col { font-family: var(--font-mono); font-size: 12px; color: var(--accent-amber); font-weight: 600; padding: 6px 8px !important; }

/* Cell detail */
.cell-detail {
  margin-top: 16px; background: var(--bg-card); border-radius: var(--radius-md);
  padding: 16px; border: 1px solid var(--border);
  animation: slideUp 0.2s ease;
}

/* ═══ GRAFO VIEW ═══ */
.grafo-layout { display: flex; gap: 16px; flex-wrap: wrap; }
.grafo-svg-wrap { flex: 1 1 700px; overflow-x: auto; }
.grafo-svg {
  width: 100%; max-width: 940px; background: var(--bg-base);
  border-radius: var(--radius-lg); border: 1px solid var(--border);
}
.grafo-sidebar { flex: 0 0 260px; max-height: 620px; overflow-y: auto; padding-right: 4px; }
.grafo-sidebar-title { font-family: var(--font-display); font-size: 14px; color: var(--text-muted); margin-bottom: 10px; }
.coverage-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.coverage-label { font-size: 11px; font-weight: 600; width: 28px; }
.coverage-bar-bg { flex: 1; height: 8px; background: var(--bg-elevated); border-radius: 4px; overflow: hidden; }
.coverage-bar { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
.coverage-count { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); width: 20px; text-align: right; }

/* ═══ EJES VIEW ═══ */
.ejes-layout { display: flex; gap: 20px; }
.ejes-sidebar {
  flex: 0 0 310px; max-height: calc(100vh - 160px); overflow-y: auto;
  padding-right: 8px;
}
.ejes-sidebar::-webkit-scrollbar { width: 4px; }
.ejes-sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.ejes-main { flex: 1; min-width: 0; }
.ejes-placeholder {
  display: flex; align-items: center; justify-content: center;
  height: 320px; color: var(--text-muted); font-style: italic; font-size: 15px;
}

/* ═══ EJE DETAIL ═══ */
.eje-detail-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.eje-detail-badge {
  padding: 3px 12px; border-radius: 5px; font-size: 12px; font-weight: 600;
}
.eje-detail-title {
  font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--text-primary);
}
.eje-detail-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.65; margin-bottom: 22px; }
.section-title {
  font-family: var(--font-display); font-size: 15px; font-weight: 600;
  color: var(--text-primary); margin-bottom: 10px; margin-top: 4px;
}
.manif-item {
  padding: 10px 12px; margin-bottom: 6px; border-radius: var(--radius-md);
  border: 1px solid transparent; transition: all 0.15s;
}
.manif-item.active { background: var(--bg-card); }
.manif-item.inactive { background: var(--bg-deep); opacity: 0.3; }
.manif-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.manif-text { font-size: 13px; color: var(--text-secondary); line-height: 1.55; }
.art-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 16px; }
.art-tag {
  background: var(--bg-elevated); color: var(--text-secondary); padding: 3px 10px;
  border-radius: 4px; font-size: 12px; font-family: var(--font-mono);
}
.conn-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 16px; }
.conn-btn {
  padding: 5px 12px; border-radius: var(--radius-sm); font-size: 12px;
  cursor: pointer; font-family: var(--font-body); border: 1px solid; transition: all 0.15s;
  background: transparent;
}
.conn-btn:hover { transform: translateY(-1px); }

/* Consejo box */
.consejo-box {
  margin-top: 22px; padding: 16px; border-radius: var(--radius-md);
  background: rgba(52, 211, 153, 0.06); border: 1px solid rgba(52, 211, 153, 0.2);
}
.consejo-label { font-weight: 700; font-size: 13px; color: var(--accent-emerald); margin-bottom: 6px; }
.consejo-text { font-size: 13px; color: #a7f3d0; line-height: 1.6; font-style: italic; }

/* ═══ DETAIL PANEL (OVERLAY) ═══ */
.detail-overlay {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: min(540px, 92vw);
  background: var(--bg-base); border-left: 1px solid var(--border);
  overflow-y: auto; z-index: 200;
  box-shadow: -10px 0 40px rgba(0,0,0,0.6);
  padding: 20px 24px;
  animation: slideIn 0.25s ease;
}
.detail-overlay-bg {
  position: fixed; inset: 0; z-index: 199;
  background: rgba(0,0,0,0.4); backdrop-filter: blur(2px);
}
.close-btn {
  position: sticky; top: 0; float: right; z-index: 10;
  background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-muted);
  width: 34px; height: 34px; border-radius: var(--radius-sm); cursor: pointer;
  font-size: 16px; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.close-btn:hover { background: var(--border); color: var(--text-primary); }

/* ═══ ANIMATIONS ═══ */
@keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.fade-in { animation: fadeIn 0.3s ease; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Responsive */
@media (max-width: 768px) {
  .header { padding: 10px 14px; }
  .header-title { font-size: 18px; }
  .main { padding: 14px; }
  .bloques-grid { grid-template-columns: 1fr; }
  .ejes-layout { flex-direction: column; }
  .ejes-sidebar { flex: none; max-height: 300px; }
  .grafo-layout { flex-direction: column; }
  .grafo-sidebar { flex: none; }
  .search-input { width: 100%; }
  .detail-overlay { width: 100vw; }
}
</style>

// ═══════════════════════════════════════════════════════════════
//  APP STATE & RENDER ENGINE
// ═══════════════════════════════════════════════════════════════

const state = {
  view: "bloques",
  selectedBloque: null,
  selectedEje: null,
  selectedCell: null,
  searchText: "",
  filterCategoria: null,
  filterBloque: null,
  hoveredEje: null,
};

function setState(updates) {
  Object.assign(state, updates);
  render();
}

function getFilteredEjes() {
  let result = EJES;
  if (state.filterCategoria) result = result.filter(e => e.categoria === state.filterCategoria);
  if (state.filterBloque) result = result.filter(e => e.temas.some(t => BLOQUES.find(b => b.id === state.filterBloque)?.temas.includes(t)));
  if (state.searchText) {
    const q = state.searchText.toLowerCase();
    result = result.filter(e =>
      e.nombre.toLowerCase().includes(q) ||
      e.descripcion.toLowerCase().includes(q) ||
      Object.values(e.manifestaciones).some(m => m.toLowerCase().includes(q)) ||
      e.articulosLCS.some(a => a.toLowerCase().includes(q))
    );
  }
  return result;
}

function isPuente(eje) {
  const bloques = new Set(eje.temas.map(t => TEMAS[t]?.bloque));
  return bloques.size > 1;
}

function temaTag(tid, size="sm") {
  const t = TEMAS[tid];
  if (!t) return '';
  const p = size==="sm" ? "1px 6px" : "2px 8px";
  const fs = size==="sm" ? "10px" : "11px";
  return `<span class="tema-tag" style="background:${t.color}22;color:${t.color};padding:${p};font-size:${fs}">${tid}</span>`;
}

// ═══════════════════════════════════════════════════════════════
//  RENDER FUNCTIONS
// ═══════════════════════════════════════════════════════════════

function render() {
  const app = document.getElementById('app');
  const filtered = getFilteredEjes();
  app.innerHTML = `
    ${renderHeader()}
    <main class="main">
      ${state.view === 'bloques' ? renderBloques(filtered) : ''}
      ${state.view === 'matriz' ? renderMatriz(filtered) : ''}
      ${state.view === 'grafo' ? renderGrafo(filtered) : ''}
      ${state.view === 'ejes' ? renderEjes(filtered) : ''}
    </main>
    ${state.selectedEje && state.view !== 'ejes' ? renderDetailOverlay() : ''}
  `;
  bindEvents();
}

function renderHeader() {
  return `
  <header class="header">
    <div class="header-top">
      <div>
        <div class="header-title">Mapa Transversal — LCS</div>
        <div class="header-sub">Temas 5–18 · Derecho del Contrato de Seguro · Oposición Inspector de Seguros del Estado</div>
      </div>
      <div class="tab-bar">
        ${['bloques','matriz','grafo','ejes'].map(v =>
          `<button class="tab-btn ${state.view===v?'active':''}" data-view="${v}">${
            {bloques:'Bloques',matriz:'Matriz',grafo:'Red',ejes:'Ejes'}[v]
          }</button>`
        ).join('')}
      </div>
    </div>
    <div class="filters">
      <input class="search-input" type="text" placeholder="Buscar conceptos, artículos, doctrina…" value="${state.searchText}" id="searchInput">
      <div class="filter-group">
        ${BLOQUES.map(b => `
          <button class="filter-btn" data-bloque="${b.id}"
            style="border:1px solid ${state.filterBloque===b.id?b.color:'var(--border)'};
            color:${state.filterBloque===b.id?b.color:'var(--text-muted)'};
            background:${state.filterBloque===b.id?b.color+'15':'transparent'}">Bl.${b.id}</button>
        `).join('')}
      </div>
      <div class="filter-group">
        ${Object.entries(CATEGORIAS_EJE).map(([k,v]) => `
          <button class="filter-btn" data-cat="${k}"
            style="border:1px solid ${state.filterCategoria===k?v.color:'var(--border)'};
            color:${state.filterCategoria===k?v.color:'var(--text-muted)'};
            background:${state.filterCategoria===k?v.color+'15':'transparent'}">${v.icon} ${v.label}</button>
        `).join('')}
      </div>
    </div>
  </header>`;
}

function renderBloques(filtered) {
  let html = `<div class="bloques-grid">`;
  for (const b of BLOQUES) {
    const ejesBloque = filtered.filter(e => e.temas.some(t => b.temas.includes(t)));
    const puenteCount = ejesBloque.filter(isPuente).length;
    const sel = state.selectedBloque === b.id;
    html += `
    <div class="bloque-card ${sel?'selected':''}" data-bloque-card="${b.id}"
      style="border-color:${sel?b.color+'55':'var(--border)'}; background:${sel?b.color+'08':'var(--bg-card)'}">
      <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${b.color};border-radius:14px 14px 0 0"></div>
      <div class="bloque-header">
        <div class="bloque-num" style="background:${b.color}18;color:${b.color}">${b.id}</div>
        <div>
          <div class="bloque-title">${b.titulo}</div>
          <div class="bloque-desc">${b.desc}</div>
        </div>
      </div>
      <div class="tema-tags">${b.temas.map(t => temaTag(t,'md')).join('')}</div>
      <div class="bloque-stats">
        <span>${ejesBloque.length} ejes transversales</span>
        <span style="color:var(--accent-amber)">🌉 ${puenteCount} puentes</span>
      </div>
    </div>`;
  }
  html += `</div>`;

  if (state.selectedBloque) {
    const b = BLOQUES.find(x => x.id === state.selectedBloque);
    const ejesBloque = filtered.filter(e => e.temas.some(t => b.temas.includes(t)));
    html += `<div class="ejes-section-title fade-in">Ejes transversales — ${b.titulo}</div>`;
    html += `<div class="ejes-grid fade-in">${ejesBloque.map(renderEjeCard).join('')}</div>`;
  }
  return html;
}

function renderEjeCard(eje) {
  const cat = CATEGORIAS_EJE[eje.categoria];
  const bridge = isPuente(eje);
  return `
  <div class="eje-card ${bridge?'puente':''}" data-eje="${eje.id}" style="border-left-color:${cat.color}">
    ${bridge ? '<span class="puente-badge" title="Puente entre bloques">🌉</span>' : ''}
    <div class="eje-cat-label" style="color:${cat.color}">${cat.icon} ${cat.label}</div>
    <div class="eje-name">${eje.nombre}</div>
    <div class="eje-temas">${eje.temas.map(t => temaTag(t)).join('')}</div>
  </div>`;
}

function renderMatriz(filtered) {
  const tids = Object.keys(TEMAS);
  let html = `<div class="matriz-wrap"><table class="matriz-table"><thead><tr>
    <th style="text-align:left;width:220px">Eje transversal</th>
    ${tids.map(t => `<th style="color:${TEMAS[t].color};width:55px">${t}</th>`).join('')}
    <th style="color:var(--accent-amber);width:40px">Σ</th>
  </tr></thead><tbody>`;

  for (const eje of filtered) {
    const cat = CATEGORIAS_EJE[eje.categoria];
    html += `<tr><td>
      <div class="matriz-eje-name" data-eje="${eje.id}">
        ${isPuente(eje)?'<span style="font-size:11px">🌉</span>':''}
        <span style="font-size:10px;color:${cat.color}">${cat.icon}</span>
        <span class="eje-name-text">${eje.nombre}</span>
      </div></td>`;
    for (const t of tids) {
      const has = eje.temas.includes(t);
      if (has) {
        const manif = eje.manifestaciones[t] || '';
        const intensity = Math.min(1, manif.length / 220);
        const alpha = Math.round(intensity * 180 + 40).toString(16).padStart(2,'0');
        const isSel = state.selectedCell?.ejeId===eje.id && state.selectedCell?.temaId===t;
        html += `<td><div class="matriz-cell ${isSel?'selected':''}" data-mcell="${eje.id}|${t}"
          style="background:${TEMAS[t].color}${alpha};${isSel?'border-color:'+TEMAS[t].color:''}"></div></td>`;
      } else {
        html += `<td><div class="matriz-cell empty"></div></td>`;
      }
    }
    html += `<td class="sigma-col">${eje.temas.length}</td></tr>`;
  }
  html += `</tbody></table></div>`;

  if (state.selectedCell) {
    const eje = EJES.find(e => e.id === state.selectedCell.ejeId);
    const tema = TEMAS[state.selectedCell.temaId];
    const manif = eje?.manifestaciones[state.selectedCell.temaId];
    if (eje && tema && manif) {
      html += `<div class="cell-detail" style="border-color:${tema.color}44">
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
          ${temaTag(state.selectedCell.temaId,'md')}
          <span style="font-family:var(--font-display);font-size:15px;font-weight:600;color:var(--text-primary)">${eje.nombre}</span>
        </div>
        <p class="manif-text">${manif}</p>
      </div>`;
    }
  }
  return html;
}

function renderGrafo(filtered) {
  const W=940, H=620, CX=W/2, CY=H/2;
  const tids = Object.keys(TEMAS);
  const rOuter = 270, rInner = 145;

  // Positions
  const tPos = {};
  tids.forEach((t,i) => {
    const a = (i/tids.length)*2*Math.PI - Math.PI/2;
    tPos[t] = { x: CX + rOuter*Math.cos(a), y: CY + rOuter*Math.sin(a) };
  });
  const ePos = {};
  filtered.forEach((e,i) => {
    const a = (i/filtered.length)*2*Math.PI - Math.PI/2;
    ePos[e.id] = { x: CX + rInner*Math.cos(a), y: CY + rInner*Math.sin(a) };
  });

  const activeEje = state.hoveredEje || state.selectedEje;
  const activeEjeObj = EJES.find(e => e.id === activeEje);

  // SVG content
  let svg = `<svg class="grafo-svg" viewBox="0 0 ${W} ${H}">`;

  // Eje-tema links
  for (const eje of filtered) {
    const ep = ePos[eje.id]; if (!ep) continue;
    for (const t of eje.temas) {
      const tp = tPos[t]; if (!tp) continue;
      const isActive = activeEje === eje.id;
      svg += `<line x1="${ep.x}" y1="${ep.y}" x2="${tp.x}" y2="${tp.y}"
        stroke="${isActive?TEMAS[t].color:'#1c2035'}" stroke-width="${isActive?2:0.5}"
        stroke-opacity="${isActive?0.75:0.12}"/>`;
    }
  }

  // Tema nodes
  for (const t of tids) {
    const p = tPos[t];
    const hl = activeEjeObj?.temas.includes(t);
    svg += `<circle cx="${p.x}" cy="${p.y}" r="23" fill="${hl?TEMAS[t].color+'33':'#10121c'}"
      stroke="${TEMAS[t].color}" stroke-width="${hl?2.5:1}"/>
      <text x="${p.x}" y="${p.y+1}" text-anchor="middle" dominant-baseline="central"
        fill="${TEMAS[t].color}" font-size="11" font-weight="700" font-family="Outfit,sans-serif">${t}</text>`;
  }

  // Eje nodes
  for (const eje of filtered) {
    const p = ePos[eje.id]; if (!p) continue;
    const cat = CATEGORIAS_EJE[eje.categoria];
    const isA = activeEje === eje.id;
    const br = isPuente(eje);
    svg += `<circle cx="${p.x}" cy="${p.y}" r="${isA?19:14}" fill="${isA?cat.color+'28':'#0b0d14'}"
      stroke="${br?'#fbbf24':cat.color}" stroke-width="${isA?2.5:1.5}"
      ${br?'stroke-dasharray="4 2"':''} class="eje-node" data-eje-node="${eje.id}" style="cursor:pointer"/>
      <text x="${p.x}" y="${p.y+1}" text-anchor="middle" dominant-baseline="central"
        fill="${cat.color}" font-size="9" style="pointer-events:none">${cat.icon}</text>`;
  }
  svg += `</svg>`;

  // Sidebar
  const maxCount = Math.max(...tids.map(t => filtered.filter(e => e.temas.includes(t)).length));
  let sidebar = `<div class="grafo-sidebar"><div class="grafo-sidebar-title">Cobertura por tema</div>`;
  for (const t of tids) {
    const count = filtered.filter(e => e.temas.includes(t)).length;
    sidebar += `<div class="coverage-row">
      <span class="coverage-label" style="color:${TEMAS[t].color}">${t}</span>
      <div class="coverage-bar-bg"><div class="coverage-bar" style="width:${(count/maxCount)*100}%;background:${TEMAS[t].color}"></div></div>
      <span class="coverage-count">${count}</span>
    </div>`;
  }
  sidebar += `</div>`;

  return `<div class="grafo-layout"><div class="grafo-svg-wrap">${svg}</div>${sidebar}</div>`;
}

function renderEjes(filtered) {
  const eje = EJES.find(e => e.id === state.selectedEje);
  return `<div class="ejes-layout">
    <div class="ejes-sidebar">
      <div class="ejes-section-title">Ejes transversales (${filtered.length})</div>
      ${filtered.map(renderEjeCard).join('')}
    </div>
    <div class="ejes-main">
      ${eje ? renderEjeDetail(eje) : '<div class="ejes-placeholder">Selecciona un eje para ver su detalle</div>'}
    </div>
  </div>`;
}

function renderEjeDetail(eje) {
  const cat = CATEGORIAS_EJE[eje.categoria];
  const tids = Object.keys(TEMAS);
  const bridge = isPuente(eje);

  let html = `<div class="fade-in">
    <div class="eje-detail-header">
      ${bridge?'<span style="font-size:20px" title="Puente entre bloques">🌉</span>':''}
      <span class="eje-detail-badge" style="background:${cat.color}18;color:${cat.color}">${cat.icon} ${cat.label}</span>
      <span class="eje-detail-title">${eje.nombre}</span>
    </div>
    <p class="eje-detail-desc">${eje.descripcion}</p>
    <div class="section-title">Manifestación por tema</div>`;

  for (const t of tids) {
    const active = eje.temas.includes(t);
    const manif = eje.manifestaciones[t];
    const tema = TEMAS[t];
    html += `<div class="manif-item ${active?'active':'inactive'}" ${active?`style="border-color:${tema.color}22"`:''}>
      <div class="manif-header">
        ${temaTag(t)} <span style="font-size:12px;color:var(--text-muted);font-weight:500">${tema.titulo.split(':')[0]}</span>
      </div>
      ${active && manif ? `<p class="manif-text">${manif}</p>` : ''}
    </div>`;
  }

  if (eje.articulosLCS.length) {
    html += `<div class="section-title" style="margin-top:18px">Artículos LCS vinculados</div>
      <div class="art-tags">${eje.articulosLCS.map(a => `<span class="art-tag">${a}</span>`).join('')}</div>`;
  }

  html += `<div class="section-title" style="margin-top:18px">Ejes relacionados</div>
    <div class="conn-tags">${eje.conexiones.map(cId => {
      const c = EJES.find(e => e.id === cId);
      if (!c) return '';
      const cc = CATEGORIAS_EJE[c.categoria];
      return `<button class="conn-btn" data-eje="${cId}" style="border-color:${cc.color}33;color:${cc.color}">${c.nombre}</button>`;
    }).join('')}</div>`;

  html += `<div class="consejo-box">
    <div class="consejo-label">💡 Consejo para la exposición oral</div>
    <p class="consejo-text">${eje.consejo}</p>
  </div></div>`;

  return html;
}

function renderDetailOverlay() {
  const eje = EJES.find(e => e.id === state.selectedEje);
  if (!eje) return '';
  return `
    <div class="detail-overlay-bg" id="overlayBg"></div>
    <div class="detail-overlay">
      <button class="close-btn" id="closeOverlay">✕</button>
      ${renderEjeDetail(eje)}
    </div>`;
}

// ═══════════════════════════════════════════════════════════════
//  EVENT BINDING
// ═══════════════════════════════════════════════════════════════

function bindEvents() {
  // Tabs
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = () => setState({ view: btn.dataset.view, selectedEje: null, selectedCell: null });
  });

  // Search
  const si = document.getElementById('searchInput');
  if (si) si.oninput = (e) => setState({ searchText: e.target.value });

  // Bloque filters
  document.querySelectorAll('[data-bloque]').forEach(btn => {
    if (btn.classList.contains('filter-btn')) {
      btn.onclick = () => {
        const id = parseInt(btn.dataset.bloque);
        setState({ filterBloque: state.filterBloque === id ? null : id });
      };
    }
  });

  // Category filters
  document.querySelectorAll('[data-cat]').forEach(btn => {
    btn.onclick = () => setState({ filterCategoria: state.filterCategoria === btn.dataset.cat ? null : btn.dataset.cat });
  });

  // Bloque cards
  document.querySelectorAll('[data-bloque-card]').forEach(card => {
    card.onclick = () => {
      const id = parseInt(card.dataset.bloqueCard);
      setState({ selectedBloque: state.selectedBloque === id ? null : id });
    };
  });

  // Eje cards & names
  document.querySelectorAll('[data-eje]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      setState({ selectedEje: el.dataset.eje });
    };
  });

  // Matrix cells
  document.querySelectorAll('[data-mcell]').forEach(cell => {
    cell.onclick = () => {
      const [ejeId, temaId] = cell.dataset.mcell.split('|');
      const isSame = state.selectedCell?.ejeId===ejeId && state.selectedCell?.temaId===temaId;
      setState({ selectedCell: isSame ? null : { ejeId, temaId } });
    };
  });

  // Grafo eje nodes
  document.querySelectorAll('[data-eje-node]').forEach(node => {
    node.onmouseenter = () => { state.hoveredEje = node.dataset.ejeNode; render(); };
    node.onmouseleave = () => { state.hoveredEje = null; render(); };
    node.onclick = () => setState({ selectedEje: node.dataset.ejeNode });
  });

  // Overlay close
  const closeBg = document.getElementById('overlayBg');
  const closeBtn = document.getElementById('closeOverlay');
  if (closeBg) closeBg.onclick = () => setState({ selectedEje: null });
  if (closeBtn) closeBtn.onclick = () => setState({ selectedEje: null });

  // Restore search focus
  const si2 = document.getElementById('searchInput');
  if (si2 && document.activeElement?.className === 'search-input') {
    si2.focus();
    si2.selectionStart = si2.selectionEnd = si2.value.length;
  }
}

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
render();
</script>
</body>
</html>
