<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Transversal LCS — Temas 5–18</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #06070b;
  --bg-base: #0b0d14;
  --bg-card: #10121c;
  --bg-elevated: #161a28;
  --border: #1c2035;
  --border-hover: #2a3050;
  --text-primary: #eaedf5;
  --text-secondary: #8b90ab;
  --text-muted: #555b78;
  --accent-indigo: #818cf8;
  --accent-violet: #a78bfa;
  --accent-amber: #fbbf24;
  --accent-emerald: #34d399;
  --accent-rose: #fb7185;
  --accent-cyan: #22d3ee;
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body: 'Outfit', 'Segoe UI', sans-serif;
  --font-mono: 'IBM Plex Mono', 'Fira Code', monospace;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Subtle grain overlay */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

.app { position: relative; z-index: 1; }

/* ═══ HEADER ═══ */
.header {
  position: sticky; top: 0; z-index: 100;
  background: linear-gradient(180deg, rgba(11,13,20,0.97) 0%, rgba(6,7,11,0.95) 100%);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
}
.header-top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.header-title {
  font-family: var(--font-display);
  font-size: 24px; font-weight: 800;
  background: linear-gradient(135deg, #818cf8 0%, #fbbf24 50%, #34d399 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-sub {
  font-size: 11px; color: var(--text-muted);
  letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px;
}

/* Tab bar */
.tab-bar {
  display: flex; gap: 3px;
  background: var(--bg-base); border-radius: 8px; padding: 3px;
  border: 1px solid var(--border);
}
.tab-btn {
  padding: 7px 18px; border-radius: var(--radius-sm); border: none;
  cursor: pointer; font-family: var(--font-body); font-size: 13px; font-weight: 600;
  background: transparent; color: var(--text-muted); transition: all 0.2s;
}
.tab-btn.active { background: var(--bg-elevated); color: var(--text-primary); }
.tab-btn:hover:not(.active) { color: var(--text-secondary); }

/* Filters */
.filters { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
.search-input {
  background: var(--bg-base); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 6px 12px; color: var(--text-primary); font-size: 13px; font-family: var(--font-body);
  width: 280px; outline: none; transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--accent-indigo); }
.search-input::placeholder { color: var(--text-muted); }
.filter-group { display: flex; gap: 4px; }
.filter-btn {
  padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer;
  font-family: var(--font-body); transition: all 0.15s; background: transparent;
}

/* ═══ MAIN ═══ */
.main { padding: 20px 24px; max-width: 1440px; margin: 0 auto; }

/* ═══ BLOQUES VIEW ═══ */
.bloques-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 16px; margin-bottom: 24px; }
.bloque-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 20px; cursor: pointer; transition: all 0.3s;
  position: relative; overflow: hidden;
}
.bloque-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
}
.bloque-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
.bloque-card.selected { border-color: var(--border-hover); }
.bloque-num {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-weight: 800; font-size: 18px;
}
.bloque-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.bloque-title { font-family: var(--font-display); font-size: 17px; font-weight: 700; color: var(--text-primary); }
.bloque-desc { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
.tema-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
.tema-tag {
  padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600;
  white-space: nowrap;
}
.bloque-stats { display: flex; gap: 16px; font-size: 12px; color: var(--text-muted); }

/* Ejes grid */
.ejes-section-title {
  font-family: var(--font-display); font-size: 16px; font-weight: 700;
  color: var(--text-primary); margin-bottom: 14px; margin-top: 8px;
}
.ejes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 10px; }

/* Eje card */
.eje-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md);
  padding: 14px; cursor: pointer; transition: all 0.25s; position: relative;
  border-left: 3px solid transparent;
}
.eje-card:hover { border-color: var(--border-hover); transform: translateY(-1px); }
.eje-card.puente { border-right: 2px dashed var(--accent-amber); }
.eje-cat-label { font-size: 11px; font-weight: 600; margin-bottom: 4px; }
.eje-name { font-family: var(--font-display); font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
.eje-temas { display: flex; gap: 4px; flex-wrap: wrap; }
.puente-badge {
  position: absolute; top: 8px; right: 8px; font-size: 13px;
}

/* ═══ MATRIZ VIEW ═══ */
.matriz-wrap { overflow-x: auto; }
.matriz-table { border-collapse: collapse; width: 100%; min-width: 950px; }
.matriz-table th {
  padding: 8px 6px; font-family: var(--font-body); font-weight: 600; font-size: 11px;
  color: var(--text-muted); border-bottom: 1px solid var(--border); text-align: center;
  position: sticky; top: 0; background: var(--bg-deep); z-index: 2;
}
.matriz-table th:first-child { text-align: left; width: 220px; }
.matriz-table td { padding: 3px 2px; text-align: center; }
.matriz-table td:first-child { padding: 6px 8px; text-align: left; }
.matriz-table tr { border-bottom: 1px solid rgba(28,32,53,0.3); }
.matriz-cell {
  width: 40px; height: 28px; border-radius: 4px; margin: 0 auto; cursor: pointer;
  transition: all 0.15s; border: 1px solid transparent;
}
.matriz-cell:hover { transform: scale(1.15); }
.matriz-cell.selected { border-width: 2px; }
.matriz-cell.empty { background: var(--bg-base); cursor: default; }
.matriz-cell.empty:hover { transform: none; }
.matriz-eje-name { display: flex; align-items: center; gap: 6px; cursor: pointer; }
.matriz-eje-name:hover .eje-name-text { color: var(--accent-indigo); }
.eje-name-text { font-size: 12px; font-weight: 600; color: var(--text-primary); transition: color 0.15s; }
.sigma-col { font-family: var(--font-mono); font-size: 12px; color: var(--accent-amber); font-weight: 600; padding: 6px 8px !important; }

/* Cell detail */
.cell-detail {
  margin-top: 16px; background: var(--bg-card); border-radius: var(--radius-md);
  padding: 16px; border: 1px solid var(--border);
  animation: slideUp 0.2s ease;
}

/* ═══ GRAFO VIEW ═══ */
.grafo-layout { display: flex; gap: 16px; flex-wrap: wrap; }
.grafo-svg-wrap { flex: 1 1 700px; overflow-x: auto; }
.grafo-svg {
  width: 100%; max-width: 940px; background: var(--bg-base);
  border-radius: var(--radius-lg); border: 1px solid var(--border);
}
.grafo-sidebar { flex: 0 0 260px; max-height: 620px; overflow-y: auto; padding-right: 4px; }
.grafo-sidebar-title { font-family: var(--font-display); font-size: 14px; color: var(--text-muted); margin-bottom: 10px; }
.grafo-tooltip { animation: slideUp 0.2s ease; }
.eje-list-item:hover { background: var(--bg-elevated) !important; }
.coverage-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.coverage-label { font-size: 11px; font-weight: 600; width: 28px; }
.coverage-bar-bg { flex: 1; height: 8px; background: var(--bg-elevated); border-radius: 4px; overflow: hidden; }
.coverage-bar { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
.coverage-count { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); width: 20px; text-align: right; }

/* ═══ EJES VIEW ═══ */
.ejes-layout { display: flex; gap: 20px; }
.ejes-sidebar {
  flex: 0 0 310px; max-height: calc(100vh - 160px); overflow-y: auto;
  padding-right: 8px;
}
.ejes-sidebar::-webkit-scrollbar { width: 4px; }
.ejes-sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.ejes-main { flex: 1; min-width: 0; }
.ejes-placeholder {
  display: flex; align-items: center; justify-content: center;
  height: 320px; color: var(--text-muted); font-style: italic; font-size: 15px;
}

/* ═══ EJE DETAIL ═══ */
.eje-detail-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.eje-detail-badge {
  padding: 3px 12px; border-radius: 5px; font-size: 12px; font-weight: 600;
}
.eje-detail-title {
  font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--text-primary);
}
.eje-detail-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.65; margin-bottom: 22px; }
.section-title {
  font-family: var(--font-display); font-size: 15px; font-weight: 600;
  color: var(--text-primary); margin-bottom: 10px; margin-top: 4px;
}
.manif-item {
  padding: 10px 12px; margin-bottom: 6px; border-radius: var(--radius-md);
  border: 1px solid transparent; transition: all 0.15s;
}
.manif-item.active { background: var(--bg-card); }
.manif-item.inactive { background: var(--bg-deep); opacity: 0.3; }
.manif-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.manif-text { font-size: 13px; color: var(--text-secondary); line-height: 1.55; }
.art-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 16px; }
.art-tag {
  background: var(--bg-elevated); color: var(--text-secondary); padding: 3px 10px;
  border-radius: 4px; font-size: 12px; font-family: var(--font-mono);
}
.conn-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 16px; }
.conn-btn {
  padding: 5px 12px; border-radius: var(--radius-sm); font-size: 12px;
  cursor: pointer; font-family: var(--font-body); border: 1px solid; transition: all 0.15s;
  background: transparent;
}
.conn-btn:hover { transform: translateY(-1px); }

/* Consejo box */
.consejo-box {
  margin-top: 22px; padding: 16px; border-radius: var(--radius-md);
  background: rgba(52, 211, 153, 0.06); border: 1px solid rgba(52, 211, 153, 0.2);
}
.consejo-label { font-weight: 700; font-size: 13px; color: var(--accent-emerald); margin-bottom: 6px; }
.consejo-text { font-size: 13px; color: #a7f3d0; line-height: 1.6; font-style: italic; }

/* ═══ DETAIL PANEL (OVERLAY) ═══ */
.detail-overlay {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: min(540px, 92vw);
  background: var(--bg-base); border-left: 1px solid var(--border);
  overflow-y: auto; z-index: 200;
  box-shadow: -10px 0 40px rgba(0,0,0,0.6);
  padding: 20px 24px;
  animation: slideIn 0.25s ease;
}
.detail-overlay-bg {
  position: fixed; inset: 0; z-index: 199;
  background: rgba(0,0,0,0.4); backdrop-filter: blur(2px);
}
.close-btn {
  position: sticky; top: 0; float: right; z-index: 10;
  background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-muted);
  width: 34px; height: 34px; border-radius: var(--radius-sm); cursor: pointer;
  font-size: 16px; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.close-btn:hover { background: var(--border); color: var(--text-primary); }

/* ═══ ANIMATIONS ═══ */
@keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.fade-in { animation: fadeIn 0.3s ease; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Responsive */
@media (max-width: 768px) {
  .header { padding: 10px 14px; }
  .header-title { font-size: 18px; }
  .main { padding: 14px; }
  .bloques-grid { grid-template-columns: 1fr; }
  .ejes-layout { flex-direction: column; }
  .ejes-sidebar { flex: none; max-height: 300px; }
  .grafo-layout { flex-direction: column; }
  .grafo-sidebar { flex: none; }
  .search-input { width: 100%; }
  .detail-overlay { width: 100vw; }
}

/* ═══ TEMARIO VIEWS ═══ */
.temario-tabs {
  display: flex; gap: 4px; margin-bottom: 20px;
  background: var(--bg-base); border-radius: 8px; padding: 3px;
  border: 1px solid var(--border); display: inline-flex;
}
.temario-tab {
  padding: 8px 20px; border-radius: 6px; border: none; cursor: pointer;
  font-family: var(--font-body); font-size: 13px; font-weight: 600;
  background: transparent; color: var(--text-muted); transition: all 0.2s;
}
.temario-tab.active { background: var(--bg-elevated); color: var(--text-primary); }

/* Dewey×JEL Heatmap */
.dewjel-table { border-collapse: collapse; width: 100%; font-size: 11px; }
.dewjel-table th {
  padding: 6px 4px; font-family: var(--font-body); font-weight: 600;
  color: var(--text-muted); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--bg-deep); z-index: 2;
}
.dewjel-table th.jel-header {
  writing-mode: vertical-lr; text-orientation: mixed;
  transform: rotate(180deg); height: 120px; font-size: 10px;
  max-width: 36px; padding: 6px 2px;
}
.dewjel-table td { padding: 2px; text-align: center; }
.dewjel-table td:first-child { text-align: left; padding: 4px 6px; }
.dewjel-dot {
  width: 28px; height: 20px; border-radius: 3px; margin: 0 auto;
  cursor: pointer; transition: all 0.15s; border: 1px solid transparent;
}
.dewjel-dot:hover { transform: scale(1.2); }
.dewjel-dot.active { border-width: 2px; }
.dewjel-dot.empty { background: var(--bg-base); cursor: default; }
.dewjel-dot.empty:hover { transform: none; }
.dewjel-tema-row td { background: var(--bg-card); }

/* Estructura view */
.estructura-layout { display: flex; gap: 20px; }
.estructura-main { flex: 1; min-width: 0; }
.estructura-sidebar { flex: 0 0 300px; position: sticky; top: 130px; max-height: calc(100vh - 160px); overflow-y: auto; }

.tema-block {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-lg); margin-bottom: 12px;
  overflow: hidden; transition: all 0.25s;
}
.tema-block.expanded { border-color: var(--border-hover); }
.tema-block-header {
  padding: 14px 18px; cursor: pointer; display: flex;
  align-items: center; gap: 12px; transition: background 0.15s;
}
.tema-block-header:hover { background: var(--bg-elevated); }
.tema-block-num {
  width: 36px; height: 36px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-weight: 800; font-size: 15px;
  flex-shrink: 0;
}
.tema-block-info { flex: 1; min-width: 0; }
.tema-block-title { font-family: var(--font-display); font-size: 15px; font-weight: 700; color: var(--text-primary); }
.tema-block-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tema-block-meta { display: flex; gap: 10px; font-size: 11px; color: var(--text-muted); flex-shrink: 0; }
.tema-block-arrow { font-size: 14px; color: var(--text-muted); transition: transform 0.2s; flex-shrink: 0; }
.tema-block.expanded .tema-block-arrow { transform: rotate(90deg); }

.tema-block-body { padding: 0 18px 16px; animation: slideUp 0.2s ease; }

.dewey-item {
  padding: 10px 12px; margin-bottom: 6px; border-radius: var(--radius-md);
  background: var(--bg-base); border-left: 3px solid var(--accent-indigo);
  cursor: pointer; transition: all 0.15s;
}
.dewey-item:hover { background: var(--bg-elevated); }
.dewey-item.selected { background: var(--bg-elevated); border-left-width: 5px; }
.dewey-code {
  font-family: var(--font-mono); font-size: 11px; font-weight: 500;
  padding: 2px 8px; border-radius: 3px; background: var(--accent-indigo);
  color: #000; display: inline-block; margin-bottom: 4px;
}
.dewey-concept { font-size: 13px; font-weight: 600; color: var(--text-primary); }
.dewey-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.dewey-oral {
  font-size: 12px; color: var(--accent-emerald); font-style: italic;
  margin-top: 6px; padding: 6px 10px; background: rgba(52,211,153,0.06);
  border-radius: 6px; border: 1px solid rgba(52,211,153,0.12);
}
.dewey-art { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }

/* JEL connections in detail */
.jel-connections { margin-top: 8px; display: flex; gap: 4px; flex-wrap: wrap; }
.jel-badge {
  font-family: var(--font-mono); font-size: 10px; padding: 2px 8px;
  border-radius: 3px; background: var(--accent-amber); color: #000;
}

/* Estructura sidebar: discourse decoder */
.decoder-title {
  font-family: var(--font-display); font-size: 16px; font-weight: 700;
  color: var(--text-primary); margin-bottom: 8px;
}
.decoder-info { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; line-height: 1.5; }
.decoder-section { margin-bottom: 12px; }
.decoder-section-title {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; margin-bottom: 6px; padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.decoder-code {
  font-family: var(--font-mono); font-size: 11px; padding: 3px 6px;
  margin: 2px; display: inline-block; border-radius: 3px; cursor: pointer;
  transition: all 0.15s;
}
.decoder-code:hover { transform: scale(1.05); }
.decoder-flow { margin-top: 16px; padding: 12px; background: var(--bg-base); border-radius: var(--radius-md); }
.decoder-flow-title { font-size: 12px; font-weight: 600; color: var(--accent-cyan); margin-bottom: 8px; }
.decoder-flow-step {
  display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px;
  font-size: 12px; line-height: 1.5;
}
.decoder-flow-num {
  width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700;
}
</style>
</head>
