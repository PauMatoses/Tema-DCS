for (const [tid, tdata] of Object.entries(GUION_DATA)) {
  for (const n of tdata.nodos) {
    if (n.tipo === 'D') {
      DEWEY.push({
        codigo: n.cod,
        tema: tid,
        concepto: n.ep.split('.').pop().trim().split(' ').slice(0,4).join(' '),
        sub: n.txt.split('.')[0],
        ley: n.cod.split('/')[1],
        art: n.cod,
        def: n.txt,
        oral: n.oral || ''
      });
    }
  }
}

// Reconstruct JEL flat array from JEL_COMPARTIDOS for backwards compatibility
const JEL = Object.entries(JEL_COMPARTIDOS).map(([cod, j]) => ({
  codigo: cod,
  nombre: j.nombre,
  cat: cod.split('.')[0],
  temas: j.temas,
  def: j.nombre,
  deweyRefs: DEWEY.filter(d => j.temas.includes(d.tema)).slice(0,3).map(d => d.codigo),
  oral: '',
  color: j.color
}));

const state = {
  view: "bloques",
  selectedBloque: null,
  selectedEje: null,
  selectedCell: null,
  searchText: "",
  filterCategoria: null,
  filterBloque: null,
  hoveredEje: null,
  temarioSubview: "dewjel",  // "dewjel" | "estructura"
  expandedTema: null,
  selectedDewey: null,
  guionTema: null,
};

function setState(updates) {
  Object.assign(state, updates);
  render();
}

function getFilteredEjes() {
  let result = EJES;
  if (state.filterCategoria) result = result.filter(e => e.categoria === state.filterCategoria);
  if (state.filterBloque) result = result.filter(e => e.temas.some(t => BLOQUES.find(b => b.id === state.filterBloque)?.temas.includes(t)));
  if (state.searchText) {
    const q = state.searchText.toLowerCase();
    result = result.filter(e =>
      e.nombre.toLowerCase().includes(q) ||
      e.descripcion.toLowerCase().includes(q) ||
      Object.values(e.manifestaciones).some(m => m.toLowerCase().includes(q)) ||
      e.articulosLCS.some(a => a.toLowerCase().includes(q))
    );
  }
  return result;
}

function isPuente(eje) {
  const bloques = new Set(eje.temas.map(t => TEMAS[t]?.bloque));
  return bloques.size > 1;
}

function temaTag(tid, size="sm") {
  const t = TEMAS[tid];
  if (!t) return '';
  const p = size==="sm" ? "1px 6px" : "2px 8px";
  const fs = size==="sm" ? "10px" : "11px";
  return `<span class="tema-tag" style="background:${t.color}22;color:${t.color};padding:${p};font-size:${fs}">${tid}</span>`;
}

// ═══════════════════════════════════════════════════════════════
//  RENDER FUNCTIONS
// ═══════════════════════════════════════════════════════════════

function render() {
  // Save scroll position before re-render
  const scrollY = window.scrollY;
  const app = document.getElementById('app');
  const filtered = getFilteredEjes();
  app.innerHTML = `
    ${renderHeader()}
    <main class="main">
      ${state.view === 'bloques' ? renderBloques(filtered) : ''}
      ${state.view === 'matriz' ? renderMatriz(filtered) : ''}
      ${state.view === 'grafo' ? renderGrafo(filtered) : ''}
      ${state.view === 'ejes' ? renderEjes(filtered) : ''}
      ${state.view === 'temario' ? renderTemario() : ''}
    </main>
    ${state.selectedEje && state.view !== 'ejes' ? renderDetailOverlay() : ''}
  `;
  bindEvents();
  // Restore scroll position after re-render
  window.scrollTo(0, scrollY);
}

function renderHeader() {
  return `
  <header class="header">
    <div class="header-top">
      <div>
        <div class="header-title">Mapa Transversal — LCS</div>
        <div class="header-sub">Temas 5–18 · Derecho del Contrato de Seguro · Oposición Inspector de Seguros del Estado</div>
      </div>
      <div class="tab-bar">
        <a href="modo_presion.html" target="_blank" style="padding:7px 14px;border-radius:6px;border:1px solid #ef4444;
          font-family:var(--font-body);font-size:12px;font-weight:700;color:#ef4444;text-decoration:none;
          letter-spacing:0.08em;text-transform:uppercase;margin-right:8px;transition:all 0.2s;background:transparent"
          onmouseover="this.style.background='#ef444415'" onmouseout="this.style.background='transparent'">⚡ PRESIÓN</a>
        ${['bloques','matriz','grafo','ejes','temario'].map(v =>
          `<button class="tab-btn ${state.view===v?'active':''}" data-view="${v}">${
            {bloques:'Bloques',matriz:'Matriz',grafo:'Red',ejes:'Ejes',temario:'Temario'}[v]
          }</button>`
        ).join('')}
      </div>
    </div>
    <div class="filters">
      <input class="search-input" type="text" placeholder="Buscar conceptos, artículos, doctrina…" value="${state.searchText}" id="searchInput">
      <div class="filter-group">
        ${BLOQUES.map(b => `
          <button class="filter-btn" data-bloque="${b.id}"
            style="border:1px solid ${state.filterBloque===b.id?b.color:'var(--border)'};
            color:${state.filterBloque===b.id?b.color:'var(--text-muted)'};
            background:${state.filterBloque===b.id?b.color+'15':'transparent'}">Bl.${b.id}</button>
        `).join('')}
      </div>
      <div class="filter-group">
        ${Object.entries(CATEGORIAS_EJE).map(([k,v]) => `
          <button class="filter-btn" data-cat="${k}"
            style="border:1px solid ${state.filterCategoria===k?v.color:'var(--border)'};
            color:${state.filterCategoria===k?v.color:'var(--text-muted)'};
            background:${state.filterCategoria===k?v.color+'15':'transparent'}">${v.icon} ${v.label}</button>
        `).join('')}
      </div>
    </div>
  </header>`;
}

function renderBloques(filtered) {
  let html = `<div class="bloques-grid">`;
  for (const b of BLOQUES) {
    const ejesBloque = filtered.filter(e => e.temas.some(t => b.temas.includes(t)));
    const puenteCount = ejesBloque.filter(isPuente).length;
    const sel = state.selectedBloque === b.id;
    html += `
    <div class="bloque-card ${sel?'selected':''}" data-bloque-card="${b.id}"
      style="border-color:${sel?b.color+'55':'var(--border)'}; background:${sel?b.color+'08':'var(--bg-card)'}">
      <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${b.color};border-radius:14px 14px 0 0"></div>
      <div class="bloque-header">
        <div class="bloque-num" style="background:${b.color}18;color:${b.color}">${b.id}</div>
        <div>
          <div class="bloque-title">${b.titulo}</div>
          <div class="bloque-desc">${b.desc}</div>
        </div>
      </div>
      <div class="tema-tags">${b.temas.map(t => temaTag(t,'md')).join('')}</div>
      <div class="bloque-stats">
        <span>${ejesBloque.length} ejes transversales</span>
        <span style="color:var(--accent-amber)">🌉 ${puenteCount} puentes</span>
      </div>
    </div>`;
  }
  html += `</div>`;

  if (state.selectedBloque) {
    const b = BLOQUES.find(x => x.id === state.selectedBloque);
    const ejesBloque = filtered.filter(e => e.temas.some(t => b.temas.includes(t)));
    html += `<div class="ejes-section-title fade-in">Ejes transversales — ${b.titulo}</div>`;
    html += `<div class="ejes-grid fade-in">${ejesBloque.map(renderEjeCard).join('')}</div>`;
  }
  return html;
}

function renderEjeCard(eje) {
  const cat = CATEGORIAS_EJE[eje.categoria];
  const bridge = isPuente(eje);
  return `
  <div class="eje-card ${bridge?'puente':''}" data-eje="${eje.id}" style="border-left-color:${cat.color}">
    ${bridge ? '<span class="puente-badge" title="Puente entre bloques">🌉</span>' : ''}
    <div class="eje-cat-label" style="color:${cat.color}">${cat.icon} ${cat.label}</div>
    <div class="eje-name">${eje.nombre}</div>
    <div class="eje-temas">${eje.temas.map(t => temaTag(t)).join('')}</div>
  </div>`;
}

function renderMatriz(filtered) {
  const tids = Object.keys(TEMAS);
  let html = `<div class="matriz-wrap"><table class="matriz-table"><thead><tr>
    <th style="text-align:left;width:220px">Eje transversal</th>
    ${tids.map(t => `<th style="color:${TEMAS[t].color};width:55px">${t}</th>`).join('')}
    <th style="color:var(--accent-amber);width:40px">Σ</th>
  </tr></thead><tbody>`;

  for (const eje of filtered) {
    const cat = CATEGORIAS_EJE[eje.categoria];
    html += `<tr><td>
      <div class="matriz-eje-name" data-eje="${eje.id}">
        ${isPuente(eje)?'<span style="font-size:11px">🌉</span>':''}
        <span style="font-size:10px;color:${cat.color}">${cat.icon}</span>
        <span class="eje-name-text">${eje.nombre}</span>
      </div></td>`;
    for (const t of tids) {
      const has = eje.temas.includes(t);
      if (has) {
        const manif = eje.manifestaciones[t] || '';
        const intensity = Math.min(1, manif.length / 220);
        const alpha = Math.round(intensity * 180 + 40).toString(16).padStart(2,'0');
        const isSel = state.selectedCell?.ejeId===eje.id && state.selectedCell?.temaId===t;
        html += `<td><div class="matriz-cell ${isSel?'selected':''}" data-mcell="${eje.id}|${t}"
          style="background:${TEMAS[t].color}${alpha};${isSel?'border-color:'+TEMAS[t].color:''}"></div></td>`;
      } else {
        html += `<td><div class="matriz-cell empty"></div></td>`;
      }
    }
    html += `<td class="sigma-col">${eje.temas.length}</td></tr>`;
  }
  html += `</tbody></table></div>`;

  if (state.selectedCell) {
    const eje = EJES.find(e => e.id === state.selectedCell.ejeId);
    const tema = TEMAS[state.selectedCell.temaId];
    const manif = eje?.manifestaciones[state.selectedCell.temaId];
    if (eje && tema && manif) {
      html += `<div class="cell-detail" style="border-color:${tema.color}44">
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
          ${temaTag(state.selectedCell.temaId,'md')}
          <span style="font-family:var(--font-display);font-size:15px;font-weight:600;color:var(--text-primary)">${eje.nombre}</span>
        </div>
        <p class="manif-text">${manif}</p>
      </div>`;
    }
  }
  return html;
}

function renderGrafo(filtered) {
  const W=1000, H=700, CX=W/2, CY=H/2;
  const tids = Object.keys(TEMAS);
  const rOuter = 300, rInner = 155;

  // Positions
  const tPos = {};
  tids.forEach((t,i) => {
    const a = (i/tids.length)*2*Math.PI - Math.PI/2;
    tPos[t] = { x: CX + rOuter*Math.cos(a), y: CY + rOuter*Math.sin(a) };
  });
  const ePos = {};
  filtered.forEach((e,i) => {
    const a = (i/filtered.length)*2*Math.PI - Math.PI/2;
    ePos[e.id] = { x: CX + rInner*Math.cos(a), y: CY + rInner*Math.sin(a) };
  });

  const activeEje = state.hoveredEje || state.selectedEje;
  const activeEjeObj = EJES.find(e => e.id === activeEje);

  // SVG content
  let svg = `<svg class="grafo-svg" viewBox="0 0 ${W} ${H}">`;
  svg += `<defs>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>`;

  // Eje-tema links
  for (const eje of filtered) {
    const ep = ePos[eje.id]; if (!ep) continue;
    for (const t of eje.temas) {
      const tp = tPos[t]; if (!tp) continue;
      const isActive = activeEje === eje.id;
      svg += `<line x1="${ep.x}" y1="${ep.y}" x2="${tp.x}" y2="${tp.y}"
        stroke="${isActive?TEMAS[t].color:'#1c2035'}" stroke-width="${isActive?2.5:0.5}"
        stroke-opacity="${isActive?0.8:0.1}"/>`;
    }
  }

  // Tema nodes (outer ring) - bigger with short title
  for (const t of tids) {
    const p = tPos[t];
    const hl = activeEjeObj?.temas.includes(t);
    const tema = TEMAS[t];
    const shortTitle = tema.titulo.length > 25 ? tema.titulo.substring(0,22)+'…' : tema.titulo;
    // Label position: push outward from center
    const a = Math.atan2(p.y - CY, p.x - CX);
    const lx = p.x + 32 * Math.cos(a);
    const ly = p.y + 32 * Math.sin(a);
    const anchor = Math.abs(a) < Math.PI/2 ? 'start' : 'end';

    svg += `<circle cx="${p.x}" cy="${p.y}" r="24" fill="${hl?tema.color+'44':'#10121c'}"
      stroke="${tema.color}" stroke-width="${hl?3:1.2}" ${hl?'filter="url(#glow)"':''}/>
      <text x="${p.x}" y="${p.y+1}" text-anchor="middle" dominant-baseline="central"
        fill="${tema.color}" font-size="12" font-weight="700" font-family="Outfit,sans-serif">${t}</text>
      <text x="${lx}" y="${ly+1}" text-anchor="${anchor}" dominant-baseline="central"
        fill="${hl?tema.color:'#555b78'}" font-size="9" font-family="Outfit,sans-serif"
        style="pointer-events:none">${shortTitle}</text>`;
  }

  // Eje nodes (inner ring) - much bigger, with visible label
  for (const eje of filtered) {
    const p = ePos[eje.id]; if (!p) continue;
    const cat = CATEGORIAS_EJE[eje.categoria];
    const isA = activeEje === eje.id;
    const br = isPuente(eje);
    const r = isA ? 24 : 18;

    // Abbreviate name for the node
    const words = eje.nombre.split(' ');
    let abbr = eje.nombre;
    if (abbr.length > 18) {
      // Take meaningful abbreviation
      abbr = words.slice(0, 2).join(' ');
      if (abbr.length > 18) abbr = words[0].substring(0,15) + '…';
    }

    // Label below/above node
    const a = Math.atan2(p.y - CY, p.x - CX);
    const labelOffset = r + 12;
    const lx = p.x + labelOffset * Math.cos(a) * 0.3;
    const ly = p.y + labelOffset + (p.y < CY ? -labelOffset*2 - 4 : 4);

    svg += `<g class="eje-node-group" data-eje-node="${eje.id}" style="cursor:pointer">
      <circle cx="${p.x}" cy="${p.y}" r="${r}" fill="${isA?cat.color+'30':'#0b0d14'}"
        stroke="${br?'#fbbf24':cat.color}" stroke-width="${isA?3:1.8}"
        ${br?'stroke-dasharray="5 3"':''} ${isA?'filter="url(#glow)"':''}/>
      <text x="${p.x}" y="${p.y-2}" text-anchor="middle" dominant-baseline="central"
        fill="${cat.color}" font-size="${isA?12:10}" style="pointer-events:none">${cat.icon}</text>
      <text x="${p.x}" y="${p.y+9}" text-anchor="middle" dominant-baseline="central"
        fill="${isA?'#eaedf5':cat.color}" font-size="${isA?7:6}" font-weight="600"
        font-family="Outfit,sans-serif" style="pointer-events:none">${br?'🌉 ':''}${eje.temas.length}T</text>
      <text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="central"
        fill="${isA?'#eaedf5':'#6b7094'}" font-size="${isA?10:8.5}" font-weight="${isA?'600':'400'}"
        font-family="Outfit,sans-serif" style="pointer-events:none">${abbr}</text>
    </g>`;
  }

  svg += `</svg>`;

  // Tooltip for selected eje
  let tooltip = '';
  if (activeEje) {
    const eje = EJES.find(e => e.id === activeEje);
    if (eje) {
      const cat = CATEGORIAS_EJE[eje.categoria];
      tooltip = `<div class="grafo-tooltip fade-in" style="
        background:var(--bg-card);border:1px solid ${cat.color}44;border-radius:var(--radius-md);
        padding:14px;margin-top:12px;border-left:3px solid ${cat.color}">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <span style="font-size:11px;color:${cat.color};font-weight:600">${cat.icon} ${cat.label}</span>
          ${isPuente(eje)?'<span style="font-size:12px">🌉</span>':''}
        </div>
        <div style="font-family:var(--font-display);font-size:16px;font-weight:600;color:var(--text-primary);margin-bottom:6px">
          ${eje.nombre}
        </div>
        <p style="font-size:12px;color:var(--text-secondary);line-height:1.5;margin:0 0 8px">${eje.descripcion}</p>
        <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px">
          ${eje.temas.map(t => temaTag(t)).join('')}
        </div>
        <button class="conn-btn" data-eje="${eje.id}" style="border-color:${cat.color}44;color:${cat.color};font-size:11px;padding:4px 10px">
          Ver detalle completo →
        </button>
      </div>`;
    }
  }

  // Sidebar - coverage + legend
  const maxCount = Math.max(...tids.map(t => filtered.filter(e => e.temas.includes(t)).length));
  let sidebar = `<div class="grafo-sidebar">`;

  // Legend
  sidebar += `<div class="grafo-sidebar-title">Leyenda</div>
    <div style="margin-bottom:16px;font-size:11px">
      <div style="margin-bottom:4px;color:var(--text-muted)"><b>Anillo exterior:</b> Temas (T5–T18)</div>
      <div style="margin-bottom:8px;color:var(--text-muted)"><b>Anillo interior:</b> Ejes transversales</div>
      ${Object.entries(CATEGORIAS_EJE).map(([k,v]) =>
        `<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
          <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${v.color}"></span>
          <span style="color:${v.color}">${v.icon} ${v.label}</span>
        </div>`
      ).join('')}
      <div style="display:flex;align-items:center;gap:6px;margin-top:6px;padding-top:6px;border-top:1px solid var(--border)">
        <span style="display:inline-block;width:10px;height:10px;border-radius:50%;border:2px dashed #fbbf24"></span>
        <span style="color:#fbbf24">🌉 Puente entre bloques</span>
      </div>
    </div>`;

  sidebar += `<div class="grafo-sidebar-title">Cobertura por tema</div>`;
  for (const t of tids) {
    const count = filtered.filter(e => e.temas.includes(t)).length;
    sidebar += `<div class="coverage-row">
      <span class="coverage-label" style="color:${TEMAS[t].color}">${t}</span>
      <div class="coverage-bar-bg"><div class="coverage-bar" style="width:${(count/maxCount)*100}%;background:${TEMAS[t].color}"></div></div>
      <span class="coverage-count">${count}</span>
    </div>`;
  }

  // List of ejes (clickable)
  sidebar += `<div class="grafo-sidebar-title" style="margin-top:16px">Ejes (toca para iluminar)</div>`;
  for (const eje of filtered) {
    const cat = CATEGORIAS_EJE[eje.categoria];
    const isA = activeEje === eje.id;
    sidebar += `<div class="eje-list-item" data-eje-node="${eje.id}" style="
      display:flex;align-items:center;gap:6px;padding:5px 8px;margin-bottom:3px;border-radius:6px;cursor:pointer;
      background:${isA?cat.color+'15':'transparent'};border:1px solid ${isA?cat.color+'33':'transparent'};transition:all 0.15s">
      <span style="font-size:10px">${cat.icon}</span>
      <span style="font-size:11px;color:${isA?'var(--text-primary)':'var(--text-secondary)'};font-weight:${isA?'600':'400'}">${eje.nombre}</span>
      <span style="margin-left:auto;font-size:10px;color:var(--text-muted);font-family:var(--font-mono)">${eje.temas.length}</span>
    </div>`;
  }

  sidebar += `</div>`;

  return `<div class="grafo-layout"><div class="grafo-svg-wrap">${svg}${tooltip}</div>${sidebar}</div>`;
}

function renderEjes(filtered) {
  const eje = EJES.find(e => e.id === state.selectedEje);
  return `<div class="ejes-layout">
    <div class="ejes-sidebar">
      <div class="ejes-section-title">Ejes transversales (${filtered.length})</div>
      ${filtered.map(renderEjeCard).join('')}
    </div>
    <div class="ejes-main">
      ${eje ? renderEjeDetail(eje) : '<div class="ejes-placeholder">Selecciona un eje para ver su detalle</div>'}
    </div>
  </div>`;
}

function renderTemario() {
  return `
    <div class="temario-tabs">
      <button class="temario-tab ${state.temarioSubview==='dewjel'?'active':''}" data-temview="dewjel">Dewey × JEL</button>
      <button class="temario-tab ${state.temarioSubview==='estructura'?'active':''}" data-temview="estructura">Estructura Oral</button>
      <button class="temario-tab ${state.temarioSubview==='guion'?'active':''}" data-temview="guion">Guión Integrado</button>
      <button class="temario-tab ${state.temarioSubview==='indice'?'active':''}" data-temview="indice">Índice D+J</button>
    </div>
    ${state.temarioSubview === 'dewjel' ? renderDewJel() : ''}
    ${state.temarioSubview === 'estructura' ? renderEstructura() : ''}
    ${state.temarioSubview === 'guion' ? renderGuion() : ''}
    ${state.temarioSubview === 'indice' ? renderIndice() : ''}
  `;
}

// ── SUBVIEW 1: Dewey × JEL heatmap ──

function renderDewJel() {
  const tids = Object.keys(TEMAS);
  // Group dewey by tema
  const deweyByTema = {};
  tids.forEach(t => { deweyByTema[t] = DEWEY.filter(d => d.tema === t); });

  let html = `<p style="font-size:12px;color:var(--text-muted);margin-bottom:14px">
    <b>Filas</b> = códigos Dewey (norma positiva, secuencial por tema) · <b>Columnas</b> = códigos JEL (ideas abstractas compartidas) · Celda activa = la idea cruza ese artículo/norma
  </p>`;
  html += `<div class="matriz-wrap"><table class="dewjel-table"><thead><tr>
    <th style="text-align:left;min-width:200px;font-size:10px">Dewey</th>
    <th style="text-align:left;min-width:140px;font-size:10px">Concepto</th>
    ${JEL.map(j => `<th class="jel-header" title="${j.nombre}" style="color:var(--accent-amber)">${j.codigo}</th>`).join('')}
  </tr></thead><tbody>`;

  for (const tid of tids) {
    const tema = TEMAS[tid];
    // Tema header row
    html += `<tr class="dewjel-tema-row"><td colspan="${JEL.length + 2}" style="padding:8px 6px;font-family:var(--font-display);font-size:13px;font-weight:700;color:${tema.color};border-top:2px solid ${tema.color}33">
      ${tid} — ${tema.titulo}
    </td></tr>`;

    for (const d of deweyByTema[tid]) {
      html += `<tr><td style="padding:3px 6px">
        <span style="font-family:var(--font-mono);font-size:10px;color:var(--accent-indigo)">${d.codigo}</span>
      </td><td style="padding:3px 6px">
        <span style="font-size:11px;color:var(--text-secondary)">${d.sub.substring(0,40)}${d.sub.length>40?'…':''}</span>
      </td>`;

      for (const j of JEL) {
        // Does this JEL connect to this Dewey?
        const connected = j.deweyRefs.some(ref => d.codigo.startsWith(ref)) || (j.temas.includes(d.tema));
        // Stronger connection if deweyRef matches directly
        const strong = j.deweyRefs.some(ref => d.codigo.startsWith(ref));
        if (connected) {
          const color = strong ? 'var(--accent-amber)' : tema.color;
          const opacity = strong ? 'cc' : '55';
          html += `<td><div class="dewjel-dot" style="background:${color}${opacity}" title="${j.nombre} ↔ ${d.sub}"></div></td>`;
        } else {
          html += `<td><div class="dewjel-dot empty"></div></td>`;
        }
      }
      html += `</tr>`;
    }
  }

  html += `</tbody></table></div>`;

  // Legend
  html += `<div style="margin-top:16px;display:flex;gap:20px;font-size:11px;color:var(--text-muted);flex-wrap:wrap">
    <div><span style="display:inline-block;width:14px;height:10px;border-radius:2px;background:var(--accent-amber);margin-right:4px;vertical-align:middle"></span> Conexión directa (Dewey referenciado por JEL)</div>
    <div><span style="display:inline-block;width:14px;height:10px;border-radius:2px;background:var(--accent-indigo);opacity:0.5;margin-right:4px;vertical-align:middle"></span> Conexión por tema compartido</div>
  </div>`;

  // JEL legend below
  html += `<div style="margin-top:20px"><div class="section-title">Códigos JEL — Ideas abstractas compartidas</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:8px;margin-top:8px">`;
  for (const j of JEL) {
    html += `<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;border-left:3px solid var(--accent-amber)">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
        <span class="jel-badge">${j.codigo}</span>
        <span style="font-size:12px;font-weight:600;color:var(--text-primary)">${j.nombre}</span>
      </div>
      <div style="font-size:11px;color:var(--text-muted)">${j.def.substring(0,100)}…</div>
      <div style="margin-top:4px;display:flex;gap:3px;flex-wrap:wrap">
        ${j.temas.map(t => temaTag(t)).join('')}
      </div>
    </div>`;
  }
  html += `</div></div>`;

  return html;
}

// ── SUBVIEW 2: Estructura Oral (discourse decoder) ──

function renderEstructura() {
  const tids = Object.keys(TEMAS);
  const deweyByTema = {};
  tids.forEach(t => { deweyByTema[t] = DEWEY.filter(d => d.tema === t); });

  // Discourse flow: sequence of Dewey codes for 15min oral
  const discourseFlow = [
    {min:"0:00–1:30",label:"Apertura conceptual",codes:["2000/LCS/1","2000/LCS/1.car"],nota:"Definición (art.1), caracteres, teoría dualista. Engancha con el tribunal."},
    {min:"1:30–3:00",label:"Marco normativo",codes:["2000/LCS/2.est","2000/LCS/2"],nota:"Estructura LCS (Títulos I-IV), imperatividad (art.2). Ancla todo lo que viene."},
    {min:"3:00–4:30",label:"Elementos del contrato",codes:["2000/LCS/7.fig","2000/LCS/1.rgo","2000/LCS/14","2000/LCS/25-80"],nota:"Tomador-asegurado-beneficiario, riesgo, prima, interés. Transición: 'Estos elementos se formalizan en…'"},
    {min:"4:30–5:30",label:"Formalización",codes:["2000/LCS/8","2000/LCS/6"],nota:"Póliza, proposición, cobertura provisional. Rápido: 'Formalizado el contrato, veamos sus reglas de funcionamiento…'"},
    {min:"5:30–7:30",label:"Disposiciones generales",codes:["2000/LCS/10","2000/LCS/11-12","2000/LCS/14-15","2000/LCS/16","2000/LCS/20","2000/LCS/19"],nota:"Arts. 10-20: declaración, agravación, prima, siniestro, mora, provocación. Núcleo duro del Título I."},
    {min:"7:30–9:00",label:"Principio indemnizatorio y daños",codes:["2000/LCS/26","2000/LCS/30","2000/LCS/31","2000/LCS/43"],nota:"Art. 26, infra/sobreseguro, subrogación. Transición: 'Este principio se aplica en los seguros de cosas…'"},
    {min:"9:00–10:00",label:"Seguros de cosas",codes:["2000/LCS/45-49","2000/LCS/50-53","2000/LCS/54-62"],nota:"Incendios, robo, transporte. Breve: ejemplificar el principio indemnizatorio en la práctica."},
    {min:"10:00–11:00",label:"Seguros patrimoniales",codes:["2000/LCS/63","2000/LCS/68","2000/LCS/68.fi","2000/LCS/69-72"],nota:"Lucro cesante, caución (diferencias con fianza), crédito. 'El seguro deja de cubrir cosas para cubrir patrimonios…'"},
    {min:"11:00–12:00",label:"RC y defensa jurídica",codes:["2000/LCS/73-76","2000/LCS/73.cm","2000/LCS/76","2000/LCS/76a-g"],nota:"Concepto RC, claim made, acción directa (art. 76), defensa jurídica. Pivote hacia personas."},
    {min:"12:00–13:00",label:"Seguros de personas",codes:["2000/LCS/80-82","2000/LCS/83-99","2000/LCS/95-96"],nota:"Ruptura: 'Frente a todo lo anterior, en personas no rige el principio indemnizatorio…'. Vida: clases, valores garantizados."},
    {min:"13:00–14:00",label:"Vida y accidentes",codes:["2000/LCS/84-88","2000/LCS/89","2000/LCS/93","2000/LCS/100-104"],nota:"Beneficiario, indisputabilidad, suicidio, accidentes. Compactar."},
    {min:"14:00–15:00",label:"SOA, obligatorios y cierre",codes:["2000/TRLR/1-9","2000/L35/bar","2000/L6/SOV","2000/L87/1-10","2000/LNM/406-467"],nota:"SOA+baremo, obligatorios, agrarios, marítimo. Cierre circular: 'Del seguro marítimo como origen al sistema actual…'"},
  ];

  let html = `<div class="estructura-layout"><div class="estructura-main">`;

  // Discourse decoder timeline
  html += `<div style="margin-bottom:24px">
    <div class="decoder-title">🎯 Secuencia para exposición oral de 15 min (≈2.250 palabras)</div>
    <div class="decoder-info">Cada bloque temporal mapea los códigos Dewey que debes cubrir. Toca un bloque para ver los códigos expandidos. Los códigos JEL conectan ideas entre bloques.</div>`;

  for (let i = 0; i < discourseFlow.length; i++) {
    const step = discourseFlow[i];
    const isExpanded = state.expandedTema === 'flow_'+i;
    const bloqueNum = i < 2 ? 1 : i < 5 ? 1 : i < 9 ? 2 : 3;
    const bloqueColor = BLOQUES[bloqueNum-1].color;

    html += `<div class="tema-block ${isExpanded?'expanded':''}" style="border-left:3px solid ${bloqueColor}">
      <div class="tema-block-header" data-expand="flow_${i}">
        <div class="tema-block-num" style="background:${bloqueColor}18;color:${bloqueColor};font-size:12px;width:60px;border-radius:6px">
          ${step.min.split('–')[0]}
        </div>
        <div class="tema-block-info">
          <div class="tema-block-title" style="font-size:14px">${step.label}</div>
          <div class="tema-block-sub">${step.nota}</div>
        </div>
        <div class="tema-block-meta">
          <span style="font-family:var(--font-mono);font-size:10px">${step.codes.length} Dewey</span>
        </div>
        <div class="tema-block-arrow">▸</div>
      </div>`;

    if (isExpanded) {
      html += `<div class="tema-block-body">`;
      for (const code of step.codes) {
        const d = DEWEY.find(x => x.codigo === code);
        if (!d) continue;
        const tema = TEMAS[d.tema];
        const relatedJels = JEL.filter(j => j.deweyRefs.some(r => code.startsWith(r)) || j.temas.includes(d.tema));
        const isSel = state.selectedDewey === code;

        html += `<div class="dewey-item ${isSel?'selected':''}" data-dewey="${code}" style="border-left-color:${tema.color}">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span class="dewey-code" style="background:${tema.color}">${d.codigo}</span>
            <span class="dewey-art">${d.art}</span>
            ${temaTag(d.tema)}
          </div>
          <div class="dewey-concept">${d.concepto}: ${d.sub}</div>
          ${isSel ? `
            <div class="dewey-sub" style="margin-top:6px"><b>Definición:</b> ${d.def}</div>
            <div class="dewey-oral">🎤 ${d.oral}</div>
            ${relatedJels.length ? `<div class="jel-connections">
              <span style="font-size:10px;color:var(--text-muted);margin-right:4px">JEL:</span>
              ${relatedJels.map(j => `<span class="jel-badge" title="${j.nombre}">${j.codigo}</span>`).join('')}
            </div>` : ''}
          ` : ''}
        </div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }

  html += `</div>`;

  // Full tema sequence (expandable)
  html += `<div style="margin-top:28px">
    <div class="decoder-title">📋 Temario completo — Estructura Dewey secuencial</div>`;

  for (const tid of tids) {
    const tema = TEMAS[tid];
    const items = deweyByTema[tid];
    const isExp = state.expandedTema === tid;

    html += `<div class="tema-block ${isExp?'expanded':''}" style="border-left:3px solid ${tema.color}">
      <div class="tema-block-header" data-expand="${tid}">
        <div class="tema-block-num" style="background:${tema.color}18;color:${tema.color}">${tid.replace('T','')}</div>
        <div class="tema-block-info">
          <div class="tema-block-title">${tema.titulo}</div>
          <div class="tema-block-sub">${tema.subtitulo}</div>
        </div>
        <div class="tema-block-meta">
          <span style="font-family:var(--font-mono);font-size:10px">${items.length}D</span>
          <span style="font-family:var(--font-mono);font-size:10px;color:var(--accent-amber)">${JEL.filter(j=>j.temas.includes(tid)).length}J</span>
        </div>
        <div class="tema-block-arrow">▸</div>
      </div>`;

    if (isExp) {
      html += `<div class="tema-block-body">`;
      for (const d of items) {
        const relatedJels = JEL.filter(j => j.deweyRefs.some(r => d.codigo.startsWith(r)) || j.temas.includes(d.tema));
        const isSel = state.selectedDewey === d.codigo;

        html += `<div class="dewey-item ${isSel?'selected':''}" data-dewey="${d.codigo}" style="border-left-color:${tema.color}">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span class="dewey-code" style="background:${tema.color}">${d.codigo}</span>
            <span class="dewey-art">${d.art}</span>
          </div>
          <div class="dewey-concept">${d.concepto}: ${d.sub}</div>
          ${isSel ? `
            <div class="dewey-sub" style="margin-top:6px"><b>Ley:</b> ${d.ley} · <b>Art.:</b> ${d.art}</div>
            <div class="dewey-sub"><b>Definición:</b> ${d.def}</div>
            <div class="dewey-oral">🎤 ${d.oral}</div>
            ${relatedJels.length ? `<div class="jel-connections">
              <span style="font-size:10px;color:var(--text-muted);margin-right:4px">JEL relacionados:</span>
              ${relatedJels.map(j => `<span class="jel-badge" title="${j.nombre}: ${j.def.substring(0,80)}…">${j.codigo} ${j.nombre}</span>`).join('')}
            </div>` : ''}
          ` : ''}
        </div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }

  html += `</div></div>`;

  // ── SIDEBAR: Decoder reference ──
  html += `<div class="estructura-sidebar">
    <div class="decoder-title">📖 Referencia rápida</div>
    <div class="decoder-info">Códigos para decodificar la estructura del discurso</div>

    <div class="decoder-section">
      <div class="decoder-section-title" style="color:var(--accent-indigo)">Dewey — Norma positiva</div>
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:6px">
        <code style="color:var(--accent-indigo)">BLOQUE/TEMA/CONCEPTO/sub</code><br>
        2000 = Seguros · /5-18 = tema · /1-n = concepto · /a-z = subnivel
      </div>`;

  // Show Dewey codes grouped by tema, compact
  for (const tid of tids) {
    const tema = TEMAS[tid];
    const items = deweyByTema[tid];
    html += `<div style="margin-bottom:6px">
      <span style="font-size:10px;font-weight:700;color:${tema.color}">${tid}</span>
      <div style="display:flex;flex-wrap:wrap;gap:2px;margin-top:2px">
        ${items.map(d => `<span class="decoder-code" style="background:${tema.color}22;color:${tema.color}" data-expand="${tid}" title="${d.sub}">${d.codigo.split('/').slice(2).join('/')}</span>`).join('')}
      </div>
    </div>`;
  }

  html += `</div><div class="decoder-section">
    <div class="decoder-section-title" style="color:var(--accent-amber)">JEL — Ideas abstractas</div>
    <div style="font-size:11px;color:var(--text-muted);margin-bottom:6px">
      Ideas que cruzan temas. Si aparece en tu Dewey, conecta con otro bloque.
    </div>`;

  for (const j of JEL) {
    html += `<div style="margin-bottom:4px;display:flex;align-items:flex-start;gap:4px">
      <span class="jel-badge" style="flex-shrink:0;font-size:9px">${j.codigo}</span>
      <span style="font-size:10px;color:var(--text-secondary)">${j.nombre} <span style="color:var(--text-muted)">(${j.temas.join(', ')})</span></span>
    </div>`;
  }

  html += `</div>

    <div class="decoder-flow">
      <div class="decoder-flow-title">⏱ Distribución temporal (15 min)</div>
      <div class="decoder-flow-step"><div class="decoder-flow-num" style="background:var(--accent-indigo)22;color:var(--accent-indigo)">1</div><span style="color:var(--text-secondary)"><b>0–3 min</b> Concepto + marco (T5)</span></div>
      <div class="decoder-flow-step"><div class="decoder-flow-num" style="background:var(--accent-indigo)22;color:var(--accent-indigo)">2</div><span style="color:var(--text-secondary)"><b>3–5.5 min</b> Elementos + forma (T6-T7)</span></div>
      <div class="decoder-flow-step"><div class="decoder-flow-num" style="background:var(--accent-indigo)22;color:var(--accent-indigo)">3</div><span style="color:var(--text-secondary)"><b>5.5–7.5 min</b> Disp. generales (T8)</span></div>
      <div class="decoder-flow-step"><div class="decoder-flow-num" style="background:var(--accent-amber)22;color:var(--accent-amber)">4</div><span style="color:var(--text-secondary)"><b>7.5–9 min</b> Ppío indemnizatorio (T9)</span></div>
      <div class="decoder-flow-step"><div class="decoder-flow-num" style="background:var(--accent-amber)22;color:var(--accent-amber)">5</div><span style="color:var(--text-secondary)"><b>9–11 min</b> Cosas + patrimonio (T10-T11)</span></div>
      <div class="decoder-flow-step"><div class="decoder-flow-num" style="background:var(--accent-amber)22;color:var(--accent-amber)">6</div><span style="color:var(--text-secondary)"><b>11–12 min</b> RC + def. jurídica (T12)</span></div>
      <div class="decoder-flow-step"><div class="decoder-flow-num" style="background:var(--accent-emerald)22;color:var(--accent-emerald)">7</div><span style="color:var(--text-secondary)"><b>12–14 min</b> Personas + vida (T13-T15)</span></div>
      <div class="decoder-flow-step"><div class="decoder-flow-num" style="background:var(--accent-emerald)22;color:var(--accent-emerald)">8</div><span style="color:var(--text-secondary)"><b>14–15 min</b> SOA + obligatorios + cierre (T16-T18)</span></div>
    </div>
  </div>`;

  html += `</div>`;
  return html;
}

// ── SUBVIEW 3: Guión Integrado (por tema, Dewey+JEL intercalados) ──

function renderGuion() {
  const tids = Object.keys(GUION_DATA);
  const selTema = state.guionTema || null;

  let html = '<div style="max-width:920px">';
  html += '<div style="margin-bottom:16px"><div class="decoder-title">🎙️ Guión Integrado — Estructura del resumen</div>';
  html += '<div class="decoder-info">Selecciona un tema. La estructura sigue exactamente los epígrafes del resumen. Los códigos <span style="color:var(--accent-indigo)">Dewey</span> (norma) y <span style="color:var(--accent-amber)">JEL</span> (idea) aparecen dentro de cada sección.</div>';
  html += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px">';
  for (const tid of tids) {
    const tema = TEMAS[tid];
    const color = tema ? tema.color : '#888';
    const isActive = selTema === tid;
    html += '<button class="filter-btn" data-guion-tema="' + tid + '" style="border:1px solid ' + (isActive ? color : 'var(--border)') + ';color:' + (isActive ? color : 'var(--text-muted)') + ';background:' + (isActive ? color + '15' : 'transparent') + ';font-weight:' + (isActive ? '700' : '400') + ';padding:5px 12px;font-size:12px">' + tid + '</button>';
  }
  html += '</div></div>';

  if (!selTema || !GUION_DATA[selTema]) {
    html += '<div class="ejes-placeholder">Selecciona un tema para ver su guión integrado</div></div>';
    return html;
  }

  const data = GUION_DATA[selTema];
  const tema = TEMAS[selTema];
  const color = tema ? tema.color : '#888';
  const nodos = data.nodos;
  const deweyCount = nodos.filter(n => n.tipo === 'D').length;
  const jelCount = nodos.filter(n => n.tipo === 'J').length;

  // Theme header — mimics resumen title
  html += '<div style="padding:18px 22px;background:' + color + '08;border:1px solid ' + color + '33;border-radius:var(--radius-lg);margin-bottom:20px;border-left:4px solid ' + color + '">';
  html += '<div style="font-family:var(--font-display);font-size:20px;font-weight:800;color:var(--text-primary);text-transform:uppercase;letter-spacing:0.02em">TEMA ' + selTema.replace('T','') + '</div>';
  html += '<div style="font-family:var(--font-display);font-size:15px;font-weight:600;color:var(--text-secondary);margin-top:4px">' + data.titulo + '</div>';
  html += '<div style="display:flex;gap:16px;margin-top:8px;font-size:12px;color:var(--text-muted)">';
  html += '<span><b style="color:var(--accent-indigo)">' + deweyCount + '</b> normas</span>';
  html += '<span><b style="color:var(--accent-amber)">' + jelCount + '</b> ideas</span>';
  html += '<span><b style="color:' + color + '">' + (deweyCount + jelCount) + '</b> nodos</span>';
  html += '</div></div>';

  // Group nodos by epígrafe sections
  // Detect section changes by looking at the ep prefix (e.g. "8.1", "8.2", "A)")
  let currentSection = '';
  let sectionNum = 0;

  for (let i = 0; i < nodos.length; i++) {
    const n = nodos[i];
    const isDewey = n.tipo === 'D';
    const nodeId = isDewey ? n.cod : 'jel_' + n.cod;
    const isSel = state.selectedDewey === nodeId;

    // Check if this is a new section (different ep prefix)
    const epBase = (n.ep || '').split(' ')[0];
    if (isDewey && epBase !== currentSection) {
      currentSection = epBase;
      sectionNum++;
      // Section header — styled like resumen epígrafe
      html += '<div style="margin-top:' + (sectionNum > 1 ? '18px' : '6px') + ';margin-bottom:8px;padding:8px 0;border-bottom:1px solid ' + color + '22">';
      html += '<span style="font-family:var(--font-display);font-size:14px;font-weight:700;color:' + color + ';text-transform:uppercase">' + n.ep + '</span>';
      html += '</div>';
    }

    if (isDewey) {
      // Dewey node — compact, resumen-like
      html += '<div class="dewey-item ' + (isSel ? 'selected' : '') + '" data-dewey="' + nodeId + '" style="border-left-color:' + color + ';padding:8px 12px;margin-bottom:4px;margin-left:8px">';
      
      // Code bar
      html += '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px">';
      html += '<span class="dewey-code" style="background:' + color + ';font-size:10px">' + n.cod + '</span>';
      if (n.pegword) html += '<span style="font-size:10px;padding:1px 6px;border-radius:3px;background:#818cf815;color:#818cf8;font-weight:600">🔑 ' + n.pegword + '</span>';
      html += '</div>';
      
      // Content — resumen style prose
      html += '<div style="font-size:13px;color:var(--text-secondary);line-height:1.65">' + n.txt + '</div>';
      
      if (isSel) {
        // Expanded: full detail
        html += '<div style="margin-top:8px;padding:10px 12px;background:var(--bg-base);border-radius:var(--radius-sm);border:1px solid var(--border)">';
        var ley = n.cod.split("/")[1];
        var art = n.cod.split("/")[2] || "";
        html += '<div style="font-size:11px;color:var(--text-muted);margin-bottom:6px"><b>Ley:</b> ' + ley + ' · <b>Artículo:</b> ' + art + ' · <b>Epígrafe:</b> ' + n.ep + '</div>';
        html += '<div class="dewey-oral">🎤 ' + (n.oral || '') + '</div>';
        // Connected JELs
        var connJels = [];
        for (var jcode in JEL_COMPARTIDOS) {
          if (JEL_COMPARTIDOS[jcode].temas.indexOf(selTema) !== -1) connJels.push({cod:jcode, nombre:JEL_COMPARTIDOS[jcode].nombre});
        }
        if (connJels.length > 0) {
          html += '<div style="margin-top:6px"><span style="font-size:10px;color:var(--text-muted)">JEL en este tema:</span> ';
          html += connJels.map(function(j){return '<span class="jel-badge" style="font-size:9px">' + j.cod + '</span>';}).join(' ');
          html += '</div>';
        }
        html += '</div>';
      }
      html += '</div>';

    } else {
      // JEL node — indented, as transition between sections
      const jel = JEL_COMPARTIDOS[n.cod];
      html += '<div class="dewey-item ' + (isSel ? 'selected' : '') + '" data-dewey="' + nodeId + '" style="border-left-color:var(--accent-amber);margin-left:28px;padding:6px 12px;margin-bottom:4px;background:rgba(251,191,36,0.03)">';
      html += '<div style="display:flex;align-items:center;gap:6px">';
      html += '<span class="jel-badge" style="font-size:9px">' + n.cod + '</span>';
      html += '<span style="font-size:12px;font-weight:600;color:var(--accent-amber)">' + n.nombre + '</span>';
      html += '</div>';
      html += '<div style="font-size:12px;color:var(--text-muted);font-style:italic;margin-top:2px">' + n.txt + '</div>';
      
      if (isSel && jel) {
        html += '<div style="margin-top:6px;padding:8px;background:rgba(251,191,36,0.04);border-radius:var(--radius-sm)">';
        html += '<div style="font-size:11px;color:var(--accent-amber);margin-bottom:4px">Aparece en ' + jel.temas.length + ' temas:</div>';
        html += '<div style="display:flex;gap:3px;flex-wrap:wrap">';
        for (var jt of jel.temas) {
          var jtema = TEMAS[jt];
          if (jtema) {
            var isCurrent = jt === selTema;
            html += '<span style="padding:1px 6px;border-radius:3px;font-size:10px;background:' + jtema.color + (isCurrent ? '33' : '12') + ';color:' + jtema.color + ';font-weight:' + (isCurrent ? '700' : '400') + '">' + jt + '</span>';
          }
        }
        html += '</div>';
        html += '<div class="dewey-oral" style="margin-top:6px;font-size:11px">💡 Usa esta idea como transición cuando conectes ' + selTema + ' con ' + jel.temas.filter(function(t){return t!==selTema}).join(', ') + '</div>';
        html += '</div>';
      }
      html += '</div>';
    }
  }

  // Pegword chain at the bottom
  const pegwords = nodos.filter(n => n.pegword);
  if (pegwords.length > 0) {
    html += '<div style="margin-top:24px;padding:16px 18px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg)">';
    html += '<div style="font-family:var(--font-display);font-size:15px;font-weight:700;color:var(--text-primary);margin-bottom:8px">🔑 Cadena de pegwords — ' + selTema + '</div>';
    html += '<div style="font-size:11px;color:var(--text-muted);margin-bottom:10px">Memoriza esta secuencia. Cada palabra dispara la sección correspondiente del resumen.</div>';
    html += '<div style="display:flex;flex-wrap:wrap;gap:3px;align-items:center">';
    for (let i = 0; i < pegwords.length; i++) {
      const p = pegwords[i];
      html += '<div style="display:flex;align-items:center;gap:3px;padding:3px 8px;background:var(--bg-elevated);border-radius:5px;border:1px solid var(--border)">';
      html += '<span style="font-family:var(--font-mono);font-size:10px;color:' + color + ';font-weight:700">' + (i+1) + '</span>';
      html += '<span style="font-size:10px;color:var(--text-primary);font-weight:600">' + p.pegword + '</span>';
      html += '</div>';
      if (i < pegwords.length - 1) html += '<span style="color:var(--text-muted);font-size:11px">→</span>';
    }
    html += '</div></div>';
  }

  html += '</div>';
  return html;
}

// ── SUBVIEW 4: Índice Dewey + JEL ──

function renderIndice() {
  const tids = Object.keys(TEMAS);
  const deweyIndex = {};
  for (const [tid, tdata] of Object.entries(GUION_DATA)) {
    for (const n of tdata.nodos) {
      if (n.tipo === 'D') {
        if (!deweyIndex[n.cod]) deweyIndex[n.cod] = {cod:n.cod, temas:[], entries:[]};
        deweyIndex[n.cod].temas.push(tid);
        deweyIndex[n.cod].entries.push({tema:tid, ep:n.ep, txt:n.txt, oral:n.oral||'', pegword:n.pegword||''});
      }
    }
  }
  const jelIndex = {};
  for (const [tid, tdata] of Object.entries(GUION_DATA)) {
    for (const n of tdata.nodos) {
      if (n.tipo === 'J') {
        if (!jelIndex[n.cod]) jelIndex[n.cod] = {cod:n.cod, nombre:n.nombre, temas_guion:[], entries:[]};
        if (jelIndex[n.cod].temas_guion.indexOf(tid) === -1) jelIndex[n.cod].temas_guion.push(tid);
        jelIndex[n.cod].entries.push({tema:tid, txt:n.txt});
      }
    }
  }
  for (const [code, data] of Object.entries(JEL_COMPARTIDOS)) {
    if (!jelIndex[code]) jelIndex[code] = {cod:code, nombre:data.nombre, temas_guion:[], entries:[]};
    jelIndex[code].temas_compartidos = data.temas;
    jelIndex[code].color = data.color;
  }

  const selItem = state.selectedDewey;
  let html = '<div style="display:flex;gap:20px;flex-wrap:wrap">';

  // LEFT: DEWEY
  html += '<div style="flex:1;min-width:320px;max-height:calc(100vh - 200px);overflow-y:auto;padding-right:8px">';
  html += '<div class="decoder-title" style="position:sticky;top:0;background:var(--bg-deep);padding-bottom:8px;z-index:2">📘 Índice Dewey — ' + Object.keys(deweyIndex).length + ' normas</div>';
  const byLey = {};
  for (const [code, data] of Object.entries(deweyIndex)) {
    const ley = code.split('/')[1];
    if (!byLey[ley]) byLey[ley] = [];
    byLey[ley].push(data);
  }
  for (const [ley, items] of Object.entries(byLey).sort((a,b) => b[1].length - a[1].length)) {
    html += '<div style="margin-bottom:12px">';
    html += '<div style="font-size:12px;font-weight:700;color:var(--accent-indigo);margin-bottom:6px;padding:4px 8px;background:rgba(129,140,248,0.08);border-radius:4px">' + ley + ' (' + items.length + ')</div>';
    for (const item of items.sort((a,b) => a.cod.localeCompare(b.cod))) {
      const isSel = selItem === 'idx_' + item.cod;
      html += '<div class="dewey-item ' + (isSel?'selected':'') + '" data-dewey="idx_' + item.cod + '" style="border-left-color:var(--accent-indigo);padding:8px 10px;margin-bottom:3px">';
      html += '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">';
      html += '<span class="dewey-code" style="background:var(--accent-indigo)">' + item.cod + '</span>';
      if (item.temas.length > 1) html += '<span style="font-size:9px;padding:1px 5px;border-radius:3px;background:#fbbf2422;color:#fbbf24;font-weight:700">' + item.temas.length + ' temas</span>';
      html += '</div>';
      html += '<div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:4px">';
      for (const t of item.temas) { const tema = TEMAS[t]; if (tema) html += '<span class="tema-tag" style="background:' + tema.color + '22;color:' + tema.color + ';padding:1px 6px;font-size:10px">' + t + '</span>'; }
      html += '</div>';
      if (isSel) {
        html += '<div style="margin-top:8px;padding:10px;background:var(--bg-base);border-radius:var(--radius-sm);border:1px solid var(--border)">';
        for (const entry of item.entries) {
          const tema = TEMAS[entry.tema]; const color = tema ? tema.color : '#888';
          html += '<div style="margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border)">';
          html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">';
          html += '<span style="font-size:11px;font-weight:700;color:' + color + '">' + entry.tema + '</span>';
          html += '<span style="font-size:11px;color:var(--text-muted)">' + entry.ep + '</span>';
          if (entry.pegword) html += '<span style="font-size:10px;padding:1px 5px;border-radius:3px;background:#818cf822;color:#818cf8;font-weight:600">🔑 ' + entry.pegword + '</span>';
          html += '</div>';
          html += '<div style="font-size:12px;color:var(--text-secondary);line-height:1.5">' + entry.txt + '</div>';
          if (entry.oral) html += '<div class="dewey-oral" style="margin-top:4px;font-size:11px">🎤 ' + entry.oral + '</div>';
          html += '</div>';
        }
        html += '</div>';
      }
      html += '</div>';
    }
    html += '</div>';
  }
  html += '</div>';

  // RIGHT: JEL
  html += '<div style="flex:1;min-width:320px;max-height:calc(100vh - 200px);overflow-y:auto;padding-right:8px">';
  html += '<div class="decoder-title" style="position:sticky;top:0;background:var(--bg-deep);padding-bottom:8px;z-index:2">📙 Índice JEL — ' + Object.keys(jelIndex).length + ' ideas</div>';
  const jelSorted = Object.values(jelIndex).sort((a,b) => ((b.temas_compartidos||b.temas_guion).length) - ((a.temas_compartidos||a.temas_guion).length));
  for (const jel of jelSorted) {
    const isSel = selItem === 'idx_jel_' + jel.cod;
    const allTemas = jel.temas_compartidos || jel.temas_guion;
    const color = jel.color || 'var(--accent-amber)';
    html += '<div class="dewey-item ' + (isSel?'selected':'') + '" data-dewey="idx_jel_' + jel.cod + '" style="border-left-color:' + color + ';padding:8px 10px;margin-bottom:3px;background:rgba(251,191,36,0.02)">';
    html += '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">';
    html += '<span class="jel-badge" style="background:' + color + '">' + jel.cod + '</span>';
    html += '<span style="font-size:12px;font-weight:600;color:' + color + '">' + jel.nombre + '</span>';
    html += '<span style="font-size:9px;padding:1px 5px;border-radius:3px;background:' + color + '22;color:' + color + ';font-weight:700">' + allTemas.length + 'T</span>';
    html += '</div>';
    html += '<div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:4px">';
    for (const t of allTemas) { const tema = TEMAS[t]; const inG = jel.temas_guion.indexOf(t)!==-1; if (tema) html += '<span class="tema-tag" style="background:' + tema.color + (inG?'33':'15') + ';color:' + tema.color + ';padding:1px 6px;font-size:10px;border:1px solid ' + (inG?tema.color+'55':'transparent') + '">' + t + (inG?' ✦':'') + '</span>'; }
    html += '</div>';
    if (isSel) {
      html += '<div style="margin-top:8px;padding:10px;background:rgba(251,191,36,0.04);border-radius:var(--radius-sm);border:1px solid rgba(251,191,36,0.12)">';
      if (jel.entries.length > 0) {
        html += '<div style="font-size:11px;font-weight:600;color:' + color + ';margin-bottom:6px">Manifestación por tema (✦ = en guión):</div>';
        for (const entry of jel.entries) {
          const tema = TEMAS[entry.tema]; const tc = tema ? tema.color : '#888';
          html += '<div style="margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid rgba(251,191,36,0.08)">';
          html += '<span style="font-size:11px;font-weight:700;color:' + tc + '">' + entry.tema + '</span> ';
          html += '<span style="font-size:12px;color:var(--text-secondary)">' + entry.txt + '</span></div>';
        }
      }
      const notIn = allTemas.filter(function(t){return jel.temas_guion.indexOf(t)===-1;});
      if (notIn.length > 0) {
        html += '<div style="margin-top:6px;font-size:11px;color:var(--text-muted)">También en: ' + notIn.map(function(t){var tm=TEMAS[t];return tm?'<span style="color:'+tm.color+'">'+t+'</span>':t;}).join(', ') + '</div>';
      }
      html += '</div>';
    }
    html += '</div>';
  }
  html += '</div></div>';
  return html;
}

function renderEjeDetail(eje) {
  const cat = CATEGORIAS_EJE[eje.categoria];
  const tids = Object.keys(TEMAS);
  const bridge = isPuente(eje);

  let html = `<div class="fade-in">
    <div class="eje-detail-header">
      ${bridge?'<span style="font-size:20px" title="Puente entre bloques">🌉</span>':''}
      <span class="eje-detail-badge" style="background:${cat.color}18;color:${cat.color}">${cat.icon} ${cat.label}</span>
      <span class="eje-detail-title">${eje.nombre}</span>
    </div>
    <p class="eje-detail-desc">${eje.descripcion}</p>
    <div class="section-title">Manifestación por tema</div>`;

  for (const t of tids) {
    const active = eje.temas.includes(t);
    const manif = eje.manifestaciones[t];
    const tema = TEMAS[t];
    html += `<div class="manif-item ${active?'active':'inactive'}" ${active?`style="border-color:${tema.color}22"`:''}>
      <div class="manif-header">
        ${temaTag(t)} <span style="font-size:12px;color:var(--text-muted);font-weight:500">${tema.titulo.split(':')[0]}</span>
      </div>
      ${active && manif ? `<p class="manif-text">${manif}</p>` : ''}
    </div>`;
  }

  if (eje.articulosLCS.length) {
    html += `<div class="section-title" style="margin-top:18px">Artículos LCS vinculados</div>
      <div class="art-tags">${eje.articulosLCS.map(a => `<span class="art-tag">${a}</span>`).join('')}</div>`;
  }

  html += `<div class="section-title" style="margin-top:18px">Ejes relacionados</div>
    <div class="conn-tags">${eje.conexiones.map(cId => {
      const c = EJES.find(e => e.id === cId);
      if (!c) return '';
      const cc = CATEGORIAS_EJE[c.categoria];
      return `<button class="conn-btn" data-eje="${cId}" style="border-color:${cc.color}33;color:${cc.color}">${c.nombre}</button>`;
    }).join('')}</div>`;

  html += `<div class="consejo-box">
    <div class="consejo-label">💡 Consejo para la exposición oral</div>
    <p class="consejo-text">${eje.consejo}</p>
  </div></div>`;

  return html;
}

function renderDetailOverlay() {
  const eje = EJES.find(e => e.id === state.selectedEje);
  if (!eje) return '';
  return `
    <div class="detail-overlay-bg" id="overlayBg"></div>
    <div class="detail-overlay">
      <button class="close-btn" id="closeOverlay">✕</button>
      ${renderEjeDetail(eje)}
    </div>`;
}

// ═══════════════════════════════════════════════════════════════
//  EVENT BINDING
// ═══════════════════════════════════════════════════════════════

function bindEvents() {
  // Tabs
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = () => setState({ view: btn.dataset.view, selectedEje: null, selectedCell: null });
  });

  // Search
  const si = document.getElementById('searchInput');
  if (si) si.oninput = (e) => setState({ searchText: e.target.value });

  // Bloque filters
  document.querySelectorAll('[data-bloque]').forEach(btn => {
    if (btn.classList.contains('filter-btn')) {
      btn.onclick = () => {
        const id = parseInt(btn.dataset.bloque);
        setState({ filterBloque: state.filterBloque === id ? null : id });
      };
    }
  });

  // Category filters
  document.querySelectorAll('[data-cat]').forEach(btn => {
    btn.onclick = () => setState({ filterCategoria: state.filterCategoria === btn.dataset.cat ? null : btn.dataset.cat });
  });

  // Bloque cards
  document.querySelectorAll('[data-bloque-card]').forEach(card => {
    card.onclick = () => {
      const id = parseInt(card.dataset.bloqueCard);
      setState({ selectedBloque: state.selectedBloque === id ? null : id });
    };
  });

  // Eje cards & names
  document.querySelectorAll('[data-eje]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      setState({ selectedEje: el.dataset.eje });
    };
  });

  // Matrix cells
  document.querySelectorAll('[data-mcell]').forEach(cell => {
    cell.onclick = () => {
      const [ejeId, temaId] = cell.dataset.mcell.split('|');
      const isSame = state.selectedCell?.ejeId===ejeId && state.selectedCell?.temaId===temaId;
      setState({ selectedCell: isSame ? null : { ejeId, temaId } });
    };
  });

  // Grafo eje nodes (SVG circles + sidebar list items)
  document.querySelectorAll('[data-eje-node]').forEach(node => {
    // Touch support for iPad: tap to select/highlight
    node.ontouchstart = (e) => {
      e.preventDefault();
      const id = node.dataset.ejeNode;
      if (state.hoveredEje === id) {
        // Second tap: open detail
        setState({ selectedEje: id, hoveredEje: null });
      } else {
        // First tap: highlight
        state.hoveredEje = id;
        render();
      }
    };
    node.onmouseenter = () => { state.hoveredEje = node.dataset.ejeNode; render(); };
    node.onmouseleave = () => { state.hoveredEje = null; render(); };
    node.onclick = (e) => {
      // On desktop click goes to highlight; double-click or if already highlighted opens detail
      const id = node.dataset.ejeNode;
      if (state.hoveredEje === id || state.selectedEje === id) {
        setState({ selectedEje: id });
      } else {
        state.hoveredEje = id;
        render();
      }
    };
  });

  // Temario sub-tabs
  document.querySelectorAll('[data-temview]').forEach(btn => {
    btn.onclick = () => setState({ temarioSubview: btn.dataset.temview, expandedTema: null, selectedDewey: null });
  });

  // Guion tema selector
  document.querySelectorAll('[data-guion-tema]').forEach(btn => {
    btn.onclick = () => setState({ guionTema: btn.dataset.guionTema, selectedDewey: null });
  });

  // Expandable tema blocks
  document.querySelectorAll('[data-expand]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const id = el.dataset.expand;
      setState({ expandedTema: state.expandedTema === id ? null : id, selectedDewey: null });
    };
  });

  // Dewey items
  document.querySelectorAll('[data-dewey]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const code = el.dataset.dewey;
      setState({ selectedDewey: state.selectedDewey === code ? null : code });
    };
  });

  // Overlay close
  const closeBg = document.getElementById('overlayBg');
  const closeBtn = document.getElementById('closeOverlay');
  if (closeBg) closeBg.onclick = () => setState({ selectedEje: null });
  if (closeBtn) closeBtn.onclick = () => setState({ selectedEje: null });

  // Restore search focus
  const si2 = document.getElementById('searchInput');
  if (si2 && document.activeElement?.className === 'search-input') {
    si2.focus();
    si2.selectionStart = si2.selectionEnd = si2.value.length;
  }
}

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
render();
</script>
</body>
</html>
